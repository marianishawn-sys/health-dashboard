      { id:"ing_pasta",            name:"Pasta",               defaultUnit:"portions",  category:"pantry" },
      { id:"ing_olives",           name:"Olives",              defaultUnit:"jars",      category:"pantry" },
      { id:"ing_honey",            name:"Honey",               defaultUnit:"jars",      category:"pantry" },
      { id:"ing_sourdough_starter",name:"Sourdough starter",   defaultUnit:"portions",  category:"pantry" },
    ];

    // ───────────────────── PANTRY INVENTORY SEED ─────────────────────
    // Starting template — sir adjusts in-app after Saturday's shop.
    const SEED_PANTRY = [
      // FREEZER — count, expiryNA
      { itemId:"ing_strip_loin",       trackingType:"count", quantity:10,  unit:"portions", parLevel:4, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_chicken_thigh",    trackingType:"count", quantity:20,  unit:"portions", parLevel:6, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_chicken_breast_f", trackingType:"count", quantity:7,   unit:"portions", parLevel:4, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_venison",          trackingType:"count", quantity:6,   unit:"portions", parLevel:2, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_pickerel",         trackingType:"count", quantity:8,   unit:"portions", parLevel:4, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_shrimp",           trackingType:"count", quantity:3,   unit:"bags",     parLevel:1, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_bbq_sausage",      trackingType:"count", quantity:6,   unit:"portions", parLevel:2, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_turkey_breast",    trackingType:"count", quantity:1,   unit:"portions", parLevel:1, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_round_roast",      trackingType:"count", quantity:1,   unit:"portions", parLevel:1, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_beef_ribs",        trackingType:"count", quantity:1,   unit:"racks",    parLevel:0, state:null, expiry:null, expiryNA:true },
      { itemId:"ing_ground_bison",     trackingType:"count", quantity:226, unit:"g",        parLevel:0, state:null, expiry:null, expiryNA:true },
      // FRIDGE — count
      { itemId:"ing_eggs",           trackingType:"count", quantity:24, unit:"eggs",       parLevel:6, state:null, expiry:null, expiryNA:false },
      { itemId:"ing_bacon",          trackingType:"count", quantity:1,  unit:"pkg",        parLevel:1, state:null, expiry:null, expiryNA:false },
      { itemId:"ing_greek_yogurt",   trackingType:"count", quantity:1,  unit:"containers", parLevel:1, state:null, expiry:null, expiryNA:false },
      { itemId:"ing_cottage_cheese", trackingType:"count", quantity:1,  unit:"containers", parLevel:1, state:null, expiry:null, expiryNA:false },
      { itemId:"ing_beef_stock",     trackingType:"count", quantity:2,  unit:"cartons",    parLevel:1, state:null, expiry:null, expiryNA:false },
      // FRIDGE — state (cheeses)
      { itemId:"ing_grana_padano", trackingType:"state", quantity:null, unit:"portions", parLevel:null, state:"have", expiry:null, expiryNA:false },
      { itemId:"ing_friulano",     trackingType:"state", quantity:null, unit:"portions", parLevel:null, state:"have", expiry:null, expiryNA:false },
      { itemId:"ing_cheddar",      trackingType:"state", quantity:null, unit:"portions", parLevel:null, state:"have", expiry:null, expiryNA:false },
      { itemId:"ing_mozzarella",   trackingType:"state", quantity:null, unit:"portions", parLevel:null, state:"have", expiry:null, expiryNA:false },
      // PRODUCE
      { itemId:"ing_sweet_potato", trackingType:"count", quantity:5, unit:"portions", parLevel:3, state:null, expiry:null, expiryNA:false },
      // PANTRY STAPLES — state, expiryNA
      { itemId:"ing_evoo",              trackingType:"state", quantity:null, unit:"bottles", parLevel:null, state:"have", expiry:null, expiryNA:true },
      { itemId:"ing_pasta",             trackingType:"state", quantity:null, unit:"portions",parLevel:null, state:"have", expiry:null, expiryNA:true },
      { itemId:"ing_olives",            trackingType:"state", quantity:null, unit:"jars",    parLevel:null, state:"have", expiry:null, expiryNA:true },
      { itemId:"ing_honey",             trackingType:"state", quantity:null, unit:"jars",    parLevel:null, state:"have", expiry:null, expiryNA:true },
      { itemId:"ing_sourdough_starter", trackingType:"state", quantity:null, unit:"portions",parLevel:null, state:"have", expiry:null, expiryNA:true, neverFlag:true },
    ];

    const seedFoodsWithIds = () => SEED_FOODS.map((f, i) => ({
      id: "f_seed_" + i.toString(36),
      ...f,
      lastUsed: null,
      useCount: 0,
      source: "seed",
    }));

    // ───────────────────── DRIVE LAYER ─────────────────────
    let tokenClient = null;
    let driveAccessToken = null;
    let folderId = null;
    let fileId = null;

    const driveFetch = async (url, opts = {}) => {
      if (!driveAccessToken) throw new Error("Not authenticated");
      const res = await fetch(url, {
        ...opts,
        headers: { ...(opts.headers || {}), Authorization: "Bearer " + driveAccessToken },
      });
      if (res.status === 401) throw new Error("Token expired");
      return res;
    };

    // Known existing data file ID from v4 deployment. If the name search misses
    // (rare; can happen if the file was renamed or trashed), we fall back to this.
    const KNOWN_DATA_FILE_ID = "1NedBi7Fa1b8e_k6CpljA9oMIwGDvoDTW";

    const findOrCreateFile = async (name, parentFolderId) => {
      // First: try the known file ID directly. drive.file scope lets us access any
      // file ID the user has previously authorized this OAuth client to touch.
      try {
        const r = await driveFetch("https://www.googleapis.com/drive/v3/files/" + KNOWN_DATA_FILE_ID + "?fields=id,name,trashed");
        if (r.ok) {
          const meta = await r.json();
          if (meta && meta.id && !meta.trashed) return meta.id;
        }
      } catch (e) { /* fall through */ }

      // Second: search by name in the folder
      try {
        const q = encodeURIComponent("name='" + name + "' and '" + parentFolderId + "' in parents and trashed=false");
        const r = await driveFetch("https://www.googleapis.com/drive/v3/files?q=" + q + "&fields=files(id,name)");
        const d = await r.json();
        if (d.files && d.files.length > 0) return d.files[0].id;
      } catch (e) { /* fall through */ }

      // Third: create new (true cold-start case)
      const cr = await driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
        method: "POST",
        headers: { "Content-Type": 'multipart/related; boundary="boundary"' },
        body: '--boundary\r\nContent-Type: application/json\r\n\r\n' +
              JSON.stringify({ name, parents: [parentFolderId], mimeType: "application/json" }) +
              '\r\n--boundary\r\nContent-Type: application/json\r\n\r\n{}\r\n--boundary--',
      });
      const cd = await cr.json();
      return cd.id;
    };

    const readDriveFile = async (id) => {
      const r = await driveFetch("https://www.googleapis.com/drive/v3/files/" + id + "?alt=media");
      const text = await r.text();
      try { return JSON.parse(text); } catch (e) { return null; }
    };

    const deleteDriveFile = async (id) => {
      return driveFetch("https://www.googleapis.com/drive/v3/files/" + id, { method: "DELETE" });
    };

    // Search for coach-*.json files in the given folder (requires drive scope).
    const searchCoachFiles = async (parentFolderId) => {
      try {
        const q = encodeURIComponent(
          `name contains 'coach-' and '${parentFolderId}' in parents and trashed = false`
        );
        const r = await driveFetch(
          `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`
        );
        if (!r.ok) return [];
        const d = await r.json();
        return d.files || [];
      } catch (e) { return []; }
    };

    const writeDriveFile = async (id, data) => {
      return driveFetch("https://www.googleapis.com/upload/drive/v3/files/" + id + "?uploadType=media", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data, null, 2),
      });
    };

    // ───────────────────── DATA MIGRATION ─────────────────────
    const migrateToV2 = (data) => {
      if (!data) return { version: 2, foods: seedFoodsWithIds(), logs: {}, grocery: [], groceryList: [], pantry: [], recipes: [], mealPlan: [], lastModified: new Date().toISOString() };
      if (data.version === 2) return data;
      // v1 → v2: add foods array, preserve everything else
      const seeded = seedFoodsWithIds();
      return {
        version: 2,
        foods: seeded,
        logs: data.logs || {},
        grocery: data.grocery || [],
        pantry: data.pantry || [],
        lastModified: new Date().toISOString(),
      };
    };

    // ───────────────────── DATA MIGRATION v3 ─────────────────────
    const migratePantryFields = (pantry) =>
      (pantry || []).map(p => {
        if (p.name && p.category) return p;
        return {
          id: p.id,
          category: p.category || p.cat || "PANTRY",
          name: p.name || p.item || "",
          quantity: p.quantity || p.qty || "",
          status: p.status || "good",
          expiry: p.expiry || "",
          addedAt: p.addedAt || new Date().toISOString(),
        };
      }).filter(p => p.name);

    const migrateGroceryFields = (grocery) =>
      (grocery || []).map(g => {
        if (g.name && typeof g.done === "boolean") return g;
        return {
          id: g.id,
          store: g.store || "OTHER",
          name: g.name || g.item || "",
          done: typeof g.done === "boolean" ? g.done : !!g.checked,
          section: g.section || g.sec || "",
          estimatedPrice: g.estimatedPrice || g.est || "",
          deal: g.deal || null,
        };
      }).filter(g => g.name);

    const migrateToV3 = (data) => {
      if (!data || (data.schema_version || 0) >= 3) return data;
      return {
        ...data,
        schema_version: 3,
        pantry: migratePantryFields(data.pantry),
        grocery: migrateGroceryFields(data.grocery),
      };
    };

    // Backfill fibre into existing seeded foods that predate the fibre update
    const backfillSeedFibre = (data) => {
      if (!data || !data.foods) return data;
      const fibreLookup = {};
      SEED_FOODS.forEach((f, i) => {
        if (f.per100g.fibre) fibreLookup["f_seed_" + i.toString(36)] = f.per100g.fibre;
      });
      const needsUpdate = data.foods.some(f => fibreLookup[f.id] !== undefined && !f.per100g.fibre);
      if (!needsUpdate) return data;
      return {
        ...data,
        foods: data.foods.map(f => {
          const fibre = fibreLookup[f.id];
          if (fibre !== undefined && !f.per100g.fibre) {
            return { ...f, per100g: { ...f.per100g, fibre } };
          }
          return f;
        }),
      };
    };

    // ───────────────────── DATA MIGRATION v4 ─────────────────────
    // Introduces ingredients registry + new pantry schema.
    // Preserves all existing pantry items; merges seed inventory for items not already present.
    const migrateToV4 = (data) => {
      if (!data || (data.schema_version || 0) >= 4) return data;

      // Build registry starting from seeds
      const ingMap = {};
      const newIngredients = SEED_INGREDIENTS.map(i => { ingMap[i.id] = i; return { ...i }; });

      // Convert old pantry items → new schema, creating registry entries as needed
      const newPantry = [];
      (data.pantry || []).forEach(old => {
        if (old.itemId) { newPantry.push(old); return; } // already migrated
        const nameLower = (old.name || "").toLowerCase().trim();
        // Try to match seed ingredient by name
        let ing = SEED_INGREDIENTS.find(i =>
          i.name.toLowerCase() === nameLower ||
          nameLower.includes(i.name.toLowerCase()) ||
          i.name.toLowerCase().includes(nameLower.split(" ")[0])
        );
        let itemId;
        if (ing) {
          itemId = ing.id;
        } else {
          itemId = "ing_" + old.id;
          if (!ingMap[itemId]) {
            const cat = (old.category || "PANTRY").toLowerCase();
            const newIng = { id: itemId, name: old.name || "Unknown", defaultUnit: "portions",
              category: cat === "freezer" || cat === "fridge" ? cat : "pantry" };
            ingMap[itemId] = newIng;
            newIngredients.push(newIng);
          }
        }
        // Parse old free-text quantity string
        const qtyStr = String(old.quantity || "");
        const m = qtyStr.match(/^(\d+\.?\d*)\s*([a-zA-Z]+)?/);
        const qty = m ? parseFloat(m[1]) : null;
        const unit = (m && m[2]) ? m[2] : (ingMap[itemId] ? ingMap[itemId].defaultUnit : "portions");
        newPantry.push({
          id: old.id,
          itemId,
          trackingType: qty != null ? "count" : "state",
          quantity: qty,
          unit,
          state: qty == null ? "have" : null,
          parLevel: null,
          expiry: old.expiry || null,
          expiryNA: !old.expiry,
        });
      });

      // Merge seeded pantry items for any itemId not already present
      const coveredIds = new Set(newPantry.map(p => p.itemId));
      SEED_PANTRY.forEach(sp => {
        if (!coveredIds.has(sp.itemId)) {
          newPantry.push({ id: uid("pan"), ...sp });
        }
      });

      return { ...data, schema_version: 4, ingredients: newIngredients, pantry: newPantry };
    };

    // ───────────────────── DATA MIGRATION v4b — groceryList ─────────────────────
    // Renames old `grocery` array → `groceryList` with source:"manual".
    // Idempotent: returns data unchanged (same ref) if groceryList already exists.
    const migrateGroceryList = (data) => {
      if (!data || data.groceryList) return data;
      const groceryList = (data.grocery || []).map(g => ({
        id: g.id || uid("g"),
        name: g.name || "",
        itemId: null,
        quantity: null,
        unit: null,
        source: "manual",
        done: !!g.done,
      })).filter(g => g.name);
      return { ...data, groceryList };
      // Note: old `grocery` key left in place for safety; GroceryTab only reads `groceryList`.
    };

    // ───────────────────── COACH INGEST (M5) ─────────────────────
    // Drain-and-delete: reads coach-*.json files from Drive, ingests content, deletes each file.
    // File types: coach-additions.json, coach-recipes.json, coach-mealplan.json
    // Returns { data, changed } — caller saves to Drive if changed === true.
    const ingestCoachFiles = async (parentFolderId, currentData) => {
      const rawFiles = await searchCoachFiles(parentFolderId);
      if (rawFiles.length === 0) return { data: currentData, changed: false };

      // Sort: additions first, recipes second, mealplan last
      // (mealplan resolution depends on recipes being ingested first)
      const ORDER = { additions: 0, recipes: 1, mealplan: 2 };
      const files = [...rawFiles].sort((a, b) => {
        const ta = Object.keys(ORDER).find(k => a.name.includes(k)) ?? "z";
        const tb = Object.keys(ORDER).find(k => b.name.includes(k)) ?? "z";
        return (ORDER[ta] ?? 99) - (ORDER[tb] ?? 99);
      });

      let data = { ...currentData };
      let changed = false;

      for (const file of files) {
        try {
          const content = await readDriveFile(file.id);
          if (!content || !content.type) { await deleteDriveFile(file.id); continue; }

          // ── coach-additions.json ── add new foods to library ──
          if (content.type === "additions") {
            const newFoods = [...(data.foods || [])];
            (content.foods || []).forEach(f => {
              if (!f.name) return;
              if (newFoods.find(e => e.name.toLowerCase() === f.name.toLowerCase())) return;
              const per = f.per100g || {};
              newFoods.push({
                id: uid("f"), name: f.name, brand: f.brand || "",
                per100g: { cal: per.cal||0, protein: per.protein||0,
                           carbs: per.carbs||0, fat: per.fat||0, fibre: per.fibre||0 },
                useCount: 0, source: "coach",
              });
            });
            data = { ...data, foods: newFoods };
            changed = true;
          }

          // ── coach-recipes.json ── add new recipes (resolve ingredient names → itemIds) ──
          if (content.type === "recipes") {
            const newRecipes  = [...(data.recipes  || [])];
            const newIngs     = [...(data.ingredients || [])];
            (content.recipes || []).forEach(r => {
              if (!r.name) return;
              if (newRecipes.find(e => e.name.toLowerCase() === r.name.toLowerCase())) return; // skip dupe
              const recipeRows = (r.ingredients || []).map(ri => {
                const nl = (ri.itemName || ri.name || "").toLowerCase();
                let ing = newIngs.find(i => i.name.toLowerCase() === nl) ||
                          newIngs.find(i => nl.includes(i.name.toLowerCase().split(" ")[0]));
                let itemId;
                if (ing) { itemId = ing.id; }
                else {
                  itemId = uid("ing");
                  ing = { id: itemId, name: ri.itemName || ri.name || "Unknown",
                          defaultUnit: ri.unit || "g", category: "pantry" };
                  newIngs.push(ing);
                }
                return { itemId, quantity: ri.quantity || 0, unit: ri.unit || "g" };
              });
              newRecipes.push({
                id: uid("rec"), name: r.name, servings: r.servings || 2,
                ingredients: recipeRows, instructions: r.instructions || "",
                createdAt: new Date().toISOString(), source: "coach",
              });
            });
            data = { ...data, recipes: newRecipes, ingredients: newIngs };
            changed = true;
          }

          // ── coach-mealplan.json ── add planned meals (resolve recipe names → ids) ──
          if (content.type === "mealplan") {
            const newPlan = [...(data.mealPlan || [])];
            (content.entries || []).forEach(e => {
              let recipeId = e.recipeId;
              if (!recipeId && e.recipeName) {
                const rec = (data.recipes || []).find(
                  r => r.name.toLowerCase() === e.recipeName.toLowerCase()
                );
                recipeId = rec?.id;
              }
              if (!recipeId || !e.date) return; // skip unresolvable
              const slot = e.slot || "dinner";
              if (newPlan.find(p => p.date === e.date && p.slot === slot && p.recipeId === recipeId)) return;
              newPlan.push({ id: uid("mp"), date: e.date, slot,
                recipeId, servings: e.servings || 2, source: "coach" });
            });
            data = { ...data, mealPlan: newPlan };
            changed = true;
          }

          await deleteDriveFile(file.id);
        } catch (e) {
          console.error("Coach ingest error:", file.name, e);
          // Don't delete on error — leave file for retry on next load
        }
      }

      return { data, changed };
    };

    // ───────────────────── MACRO CALC ─────────────────────
    const scaleMacros = (per100g, grams) => ({
      cal: round(per100g.cal * grams / 100),
      protein: round(per100g.protein * grams / 100, 1),
      carbs: round(per100g.carbs * grams / 100, 1),
      fat: round(per100g.fat * grams / 100, 1),
      fibre: round((per100g.fibre || 0) * grams / 100, 1),
    });

    const sumLogged = (logs, date) => {
      const day = logs[date] || {};
      let cal=0, protein=0, carbs=0, fat=0, fibre=0;
      ["breakfast","lunch","dinner","snacks"].forEach(meal => {
        (day[meal] || []).forEach(e => {
          cal += e.cal || 0;
          protein += e.protein || 0;
          carbs += e.carbs || 0;
          fat += e.fat || 0;
          fibre += e.fibre || 0;
        });
      });
      return { cal: round(cal), protein: round(protein,1), carbs: round(carbs,1), fat: round(fat,1), fibre: round(fibre,1) };
    };

    // ───────────────────── SEARCH SCORING ─────────────────────
    const scoreFood = (food, query, now) => {
      const q = query.trim().toLowerCase();
      if (!q) {
        // No query: rank by recency × frequency
        const recencyDays = food.lastUsed ? (now - new Date(food.lastUsed)) / 86400000 : 999;
        return (food.useCount || 0) * 10 + Math.max(0, 30 - recencyDays);
      }
      const name = (food.name || "").toLowerCase();
      const brand = (food.brand || "").toLowerCase();
      const tags = (food.tags || []).join(" ").toLowerCase();
      const hay = name + " " + brand + " " + tags;
      if (!hay.includes(q.split(" ")[0])) return -1;
      let score = 0;
      if (name.startsWith(q)) score += 100;
      else if (name.includes(q)) score += 50;
      q.split(/\s+/).forEach(tok => {
        if (hay.includes(tok)) score += 20;
      });
      score += (food.useCount || 0) * 2;
      if (food.lastUsed) {
        const recencyDays = (now - new Date(food.lastUsed)) / 86400000;
        score += Math.max(0, 20 - recencyDays);
      }
      return score;
    };

    // ───────────────────── ROOT APP ─────────────────────
    function App() {
      const [tab, setTab] = useState("today");
      const [signedIn, setSignedIn] = useState(false);
      const [loading, setLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState("idle"); // idle | saving | saved | error
      const [showSettings, setShowSettings] = useState(false);
      const [showFoodPicker, setShowFoodPicker] = useState(false);
      const [foodPickerSlot, setFoodPickerSlot] = useState(null);
      const [data, setData] = useState({ version: 2, foods: [], logs: {}, groceryList: [], pantry: [], recipes: [], mealPlan: [] });
      const [apiKey, setApiKey] = useState(localStorage.getItem("ant_api_key") || "");
      const [selectedDate, setSelectedDate] = useState(isoToday());
      const [editEntry, setEditEntry] = useState(null);   // { entry, slot } | null
      const [pendingDelete, setPendingDelete] = useState(null); // { entry, slot, date, timeoutId } | null
      const saveTimer = useRef(null);

      // ─── Auth ───
      useEffect(() => {
        const init = () => {
          if (!window.google || !window.google.accounts) {
            setTimeout(init, 200);
            return;
          }
          tokenClient = window.google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPE,
            callback: async (resp) => {
              if (resp.access_token) {
                driveAccessToken = resp.access_token;
                setSignedIn(true);
                await loadData();
              }
            },
          });
          setLoading(false);
        };
        init();
      }, []);

      const signIn = () => { if (tokenClient) tokenClient.requestAccessToken({ prompt: "" }); };
      const signOut = () => {
        if (driveAccessToken) {
          window.google.accounts.oauth2.revoke(driveAccessToken, () => {});
          driveAccessToken = null;
          setSignedIn(false);
          setShowSettings(false);
        }
      };

      const loadData = async () => {
        setLoading(true);
        try {
          folderId = DRIVE_FOLDER_ID;
          fileId = await findOrCreateFile(DATA_FILENAME, folderId);
          const raw = await readDriveFile(fileId);
          const v2 = migrateToV2(raw);
          const v3 = migrateToV3(v2);
          const v3b = backfillSeedFibre(v3);
          const v4 = migrateToV4(v3b);
          const migrated = migrateGroceryList(v4);
          if (migrated.foods.length === 0) migrated.foods = seedFoodsWithIds();

          // Drain coach-*.json files before first render
          const { data: afterCoach, changed: coachChanged } =
            await ingestCoachFiles(folderId, migrated);

          setData(afterCoach);

          const needsSave = !raw || (raw.schema_version || 0) < 4 || !raw.groceryList
            || migrated !== v4 || coachChanged;
          if (needsSave) {
            await writeDriveFile(fileId, afterCoach);
          }
        } catch (e) {
          console.error("Load failed", e);
        }
        setLoading(false);
      };

      // ─── Debounced save ───
      const saveData = useCallback((newData) => {
        const next = { ...newData, lastModified: new Date().toISOString() };
        setData(next);
        setSyncStatus("saving");
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          try {
            await writeDriveFile(fileId, next);
            setSyncStatus("saved");
            setTimeout(() => setSyncStatus("idle"), 1500);
          } catch (e) {
            setSyncStatus("error");
            console.error("Save failed", e);
          }
        }, 1200);
      }, []);

      const saveApiKey = (k) => {
        const trimmed = (k || "").trim();
        if (trimmed) {
          localStorage.setItem("ant_api_key", trimmed);
          setApiKey(trimmed);
        } else {
          localStorage.removeItem("ant_api_key");
          setApiKey("");
        }
      };

      // ─── Date helpers ───
      const today = isoToday();
      const targets = isHighCarb(new Date(selectedDate + "T12:00:00")) ? TARGETS.high : TARGETS.low;
      const totals = useMemo(() => sumLogged(data.logs, selectedDate), [data.logs, selectedDate]);

      const openFoodPicker = (slot) => {
        setFoodPickerSlot(slot);
        setShowFoodPicker(true);
      };

      const logFood = (slot, entry) => {
        const day = data.logs[selectedDate] || {};
        const meal = [...(day[slot] || []), entry];
        const next = {
          ...data,
          logs: { ...data.logs, [selectedDate]: { ...day, [slot]: meal } },
        };
        saveData(next);
      };

      const upsertFood = (food) => {
        const idx = data.foods.findIndex(f => f.id === food.id);
        let foods;
        if (idx >= 0) {
          foods = [...data.foods];
          foods[idx] = food;
        } else {
          foods = [...data.foods, food];
        }
        return foods;
      };

      const useFood = (slot, food, grams, notes, preferredUnit) => {
        const m = scaleMacros(food.per100g, grams);
        const entry = {
          id: uid("log"),
          foodId: food.id,
          name: food.name,
          brand: food.brand || "",
          grams,
          ...(preferredUnit ? { displayQty: gramsToUnit(grams, preferredUnit), displayUnit: preferredUnit } : {}),
          ...m,
          ...(notes ? { notes } : {}),
          ts: new Date().toISOString(),
        };
        const updatedFood = {
          ...food,
          lastUsed: new Date().toISOString(),
          useCount: (food.useCount || 0) + 1,
          ...(preferredUnit ? { preferredUnit } : {}),
        };
        const foods = upsertFood(updatedFood);
        const day = data.logs[selectedDate] || {};
        const meal = [...(day[slot] || []), entry];
        saveData({
          ...data,
          foods,
          logs: { ...data.logs, [selectedDate]: { ...day, [slot]: meal } },
        });
      };

      const addFoodToLibrary = (food) => {
        const newFood = { ...food, id: food.id || uid("f"), lastUsed: null, useCount: 0 };
        saveData({ ...data, foods: upsertFood(newFood) });
        return newFood;
      };

      const logMultipleScanned = (slot, scannedFoods) => {
        const now = new Date().toISOString();
        let foodsList = [...(data.foods || [])];
        const newEntries = [];
        scannedFoods.forEach(food => {
          const grams = food._scannedGrams;
          const { _scannedGrams, ...cleanFood } = food;
          const newFood = { ...cleanFood, lastUsed: now, useCount: (cleanFood.useCount || 0) + 1 };
          const idx = foodsList.findIndex(f => f.id === newFood.id);
          if (idx >= 0) foodsList[idx] = newFood; else foodsList.push(newFood);
          const m = scaleMacros(newFood.per100g, grams);
          newEntries.push({ id: uid("log"), foodId: newFood.id, name: newFood.name, brand: newFood.brand || "", grams, ...m, ts: now });
        });
        const day = data.logs[selectedDate] || {};
        const meal = [...(day[slot] || []), ...newEntries];
        saveData({ ...data, foods: foodsList, logs: { ...data.logs, [selectedDate]: { ...day, [slot]: meal } } });
        setShowFoodPicker(false);
      };

      const removeLogEntry = (slot, entryId) => {
        const day = data.logs[selectedDate] || {};
        const meal = (day[slot] || []).filter(e => e.id !== entryId);
        saveData({ ...data, logs: { ...data.logs, [selectedDate]: { ...day, [slot]: meal } } });
      };

      const requestDelete = (slot, entry) => {
        removeLogEntry(slot, entry.id);
        setPendingDelete(prev => {
          if (prev) clearTimeout(prev.timeoutId);
          const timeoutId = setTimeout(() => setPendingDelete(null), 5000);
          return { entry, slot, date: selectedDate, timeoutId };
        });
      };

      const undoDelete = () => {
        setPendingDelete(prev => {
          if (!prev) return null;
          clearTimeout(prev.timeoutId);
          const { entry, slot, date } = prev;
          const day = data.logs[date] || {};
          const meal = [...(day[slot] || []), entry].sort((a, b) => new Date(a.ts) - new Date(b.ts));
          saveData({ ...data, logs: { ...data.logs, [date]: { ...day, [slot]: meal } } });
          return null;
        });
      };

      const saveEditedEntry = (slot, entryId, updates, preferredUnit, foodId) => {
        const day = data.logs[selectedDate] || {};
        const meal = (day[slot] || []).map(e => e.id === entryId ? { ...e, ...updates } : e);
        let foods = data.foods;
        if (preferredUnit !== undefined && foodId) {
          foods = data.foods.map(f => f.id === foodId ? { ...f, preferredUnit } : f);
        }
        saveData({ ...data, foods, logs: { ...data.logs, [selectedDate]: { ...day, [slot]: meal } } });
      };

      // ─── Render ───
      if (loading && !signedIn) {
        return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div className="spin" style={{ width:32, height:32, border:"3px solid "+S.dim, borderTopColor:S.accent, borderRadius:"50%" }} />
        </div>;
      }

      if (!signedIn) {
        return <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"40px 24px" }}>
          <div style={{ fontSize:11, letterSpacing:2, color:S.dim, marginBottom:8 }}>NUTRITION CONCIERGE</div>
          <div style={{ fontSize:28, fontWeight:300, marginBottom:32, color:S.text }}>Welcome, sir.</div>
          <button onClick={signIn} style={{ background:S.accent, color:"#0a0c0f", padding:"14px 32px", border:"none", borderRadius:8, fontWeight:700, fontSize:13, letterSpacing:1, cursor:"pointer" }}>
            SIGN IN WITH GOOGLE
          </button>
          <div style={{ fontSize:11, color:S.dim, marginTop:24, textAlign:"center", maxWidth:280, lineHeight:1.5 }}>
            Connect to your Drive to sync nutrition data. Only files this app creates are accessed.
          </div>
        </div>;
      }

      return (
        <div style={{ minHeight:"100vh", background:S.bg, color:S.text, paddingBottom:80 }}>
          {/* Header */}
          <div style={{ padding:"14px 20px 8px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid "+S.border }}>
            <div>
              <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>CONCIERGE</div>
              <div style={{ fontSize:16, fontWeight:500, marginTop:2 }}>
                {DOW[new Date().getDay()]} · {MONTH[new Date().getMonth()]} {new Date().getDate()}
                <span style={{ marginLeft:10, fontSize:10, padding:"2px 8px", borderRadius:10, background: isHighCarb(new Date()) ? "rgba(122,174,242,0.15)" : "rgba(200,169,110,0.15)", color: isHighCarb(new Date()) ? S.blue : S.accent, letterSpacing:1 }}>
                  {isHighCarb(new Date()) ? "HIGH" : "LOW"}
                </span>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <SyncIndicator status={syncStatus} />
              <button onClick={() => setShowSettings(true)} style={{ background:"none", border:"none", color:S.dim, fontSize:22, cursor:"pointer", padding:"4px 8px" }}>⋯</button>
            </div>
          </div>

          {/* Tabs content */}
          {tab === "today" && (
            <TodayTab data={data} targets={targets} totals={totals}
              selectedDate={selectedDate} today={today} onDateChange={setSelectedDate}
              onAddFood={openFoodPicker}
              onRequestDelete={requestDelete} pendingDelete={pendingDelete} onUndoDelete={undoDelete}
              onEditEntry={(entry, slot) => setEditEntry({ entry, slot })} />
          )}
          {tab === "grocery" && (
            <GroceryTab data={data} setData={saveData} />
          )}
          {tab === "recipes" && (
            <RecipesTab data={data} setData={saveData} apiKey={apiKey} onMissingKey={() => setShowSettings(true)} />
          )}
          {tab === "pantry" && (
            <PantryTab data={data} setData={saveData} apiKey={apiKey} onMissingKey={() => setShowSettings(true)} />
          )}
          {tab === "deals" && (
            <DealsTab />
          )}

          {/* Bottom nav */}
          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"rgba(8,12,16,0.96)", borderTop:"1px solid "+S.border, paddingBottom:"env(safe-area-inset-bottom)", display:"flex", zIndex:50 }}>
            {[
              {k:"today",label:"TODAY"},
              {k:"grocery",label:"GROCERY"},
              {k:"recipes",label:"RECIPES"},
              {k:"pantry",label:"PANTRY"},
              {k:"deals",label:"DEALS"},
            ].map(t => (
              <button key={t.k} onClick={() => setTab(t.k)} style={{ flex:1, padding:"14px 0 12px", background:"none", border:"none", color: tab===t.k ? S.accent : S.dim, fontSize:11, fontWeight: tab===t.k ? 700 : 500, letterSpacing:1.5, cursor:"pointer", borderTop: tab===t.k ? "2px solid "+S.accent : "2px solid transparent", marginTop:-1 }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* Modals */}
          {showFoodPicker && (
            <FoodPicker
              data={data}
              slot={foodPickerSlot}
              apiKey={apiKey}
              onMissingKey={() => { setShowFoodPicker(false); setShowSettings(true); }}
              onClose={() => setShowFoodPicker(false)}
              onLog={(food, grams, notes, preferredUnit) => { useFood(foodPickerSlot, food, grams, notes, preferredUnit); setShowFoodPicker(false); }}
              onAddNewFood={(food) => addFoodToLibrary(food)}
              onLogAll={(foods) => logMultipleScanned(foodPickerSlot, foods)}
            />
          )}

          {showSettings && (
            <Settings
              apiKey={apiKey}
              data={data}
              setData={saveData}
              onClose={() => setShowSettings(false)}
              onSaveKey={saveApiKey}
              onSignOut={signOut}
              onForceSync={() => saveData(data)}
            />
          )}

          {editEntry && (
            <EditEntryModal
              entry={editEntry.entry}
              slot={editEntry.slot}
              data={data}
              onSave={saveEditedEntry}
              onDelete={(slot, id) => { removeLogEntry(slot, id); setEditEntry(null); }}
              onClose={() => setEditEntry(null)}
            />
          )}
        </div>
      );
    }

    // ───────────────────── SYNC INDICATOR ─────────────────────
    function SyncIndicator({ status }) {
      const map = {
        idle:   { color: S.dimmer, dot: "·", text: "" },
        saving: { color: S.dim, dot: "●", text: "SAVING" },
        saved:  { color: S.green, dot: "●", text: "SAVED" },
        error:  { color: S.red, dot: "●", text: "ERROR" },
      };
      const m = map[status] || map.idle;
      return <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", color: m.color, letterSpacing:1.5, display:"flex", alignItems:"center", gap:5 }}>
        <span className={status==="saving" ? "pulse" : ""}>{m.dot}</span>
        {m.text}
      </div>;
    }

    // ───────────────────── TODAY TAB ─────────────────────
    function TodayTab({ data, targets, totals, selectedDate, today, onDateChange, onAddFood, onRequestDelete, pendingDelete, onUndoDelete, onEditEntry }) {
      const day = data.logs[selectedDate] || {};
      const isToday = selectedDate === today;
      const dateInputRef = useRef(null);
      const openDatePicker = () => {
        if (!dateInputRef.current) return;
        try { dateInputRef.current.showPicker(); } catch(e) { dateInputRef.current.click(); }
      };

      const selDateObj = new Date(selectedDate + "T12:00:00");
      const todayObj = new Date(today + "T12:00:00");
      const daysAgo = Math.round((todayObj - selDateObj) / 86400000);
      const dayLabel = DOW[selDateObj.getDay()] + " · " + selDateObj.getDate() + " " + MONTH[selDateObj.getMonth()] + " " + selDateObj.getFullYear();

      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          if (e.key === "ArrowLeft") {
            const d = new Date(selectedDate + "T12:00:00");
            d.setDate(d.getDate() - 1);
            onDateChange(d.toISOString().slice(0, 10));
          }
          if (e.key === "ArrowRight" && selectedDate < today) {
            const d = new Date(selectedDate + "T12:00:00");
            d.setDate(d.getDate() + 1);
            onDateChange(d.toISOString().slice(0, 10));
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [selectedDate, today, onDateChange]);

      const meals = [
        { k: "breakfast", label: "BREAKFAST", icon: "☀️" },
        { k: "lunch",     label: "LUNCH",     icon: "🥗" },
        { k: "dinner",    label: "DINNER",    icon: "🍖" },
        { k: "snacks",    label: "SNACKS",    icon: "🥜" },
      ];

      const fibreTarget = targets.fibre || 30;
      const fibrePct = Math.min(1, fibreTarget > 0 ? totals.fibre / fibreTarget : 0);
      const fibreColor = totals.fibre >= fibreTarget ? S.green : totals.fibre >= 20 ? S.accent : S.red;

      const hasAnyEntry = Object.values(day).some(arr => Array.isArray(arr) && arr.length > 0);

      return (
        <div style={{ padding:"16px 16px 24px" }}>
          {/* Date navigation */}
          <div style={{ display:"flex", alignItems:"center", background:S.panel, borderRadius:12, padding:"10px 4px", marginBottom:14, border:"1px solid "+S.border }}>
            <button
              onClick={() => { const d = new Date(selectedDate + "T12:00:00"); d.setDate(d.getDate()-1); onDateChange(d.toISOString().slice(0,10)); }}
              style={{ background:"none", border:"none", color:S.text, fontSize:20, cursor:"pointer", padding:"4px 14px", lineHeight:1 }}>◀</button>
            <button onClick={openDatePicker}
              style={{ flex:1, textAlign:"center", background:"none", border:"none", cursor:"pointer", padding:"4px 0" }}>
              <div style={{ fontSize:13, fontWeight:600, color:S.text }}>📅 {dayLabel}</div>
              <div style={{ fontSize:10, marginTop:3, letterSpacing:1, color: isToday ? S.green : S.dim }}>
                {isToday ? "TODAY" : daysAgo === 1 ? "YESTERDAY" : "—" + daysAgo + " DAYS AGO"}
              </div>
            </button>
            <input
              ref={dateInputRef}
              type="date"
              value={selectedDate}
              max={today}
              onChange={e => e.target.value && onDateChange(e.target.value)}
              style={{ position:"absolute", width:1, height:1, opacity:0.01, pointerEvents:"none" }}
            />
            <button
              onClick={() => { if (!isToday) { const d = new Date(selectedDate + "T12:00:00"); d.setDate(d.getDate()+1); onDateChange(d.toISOString().slice(0,10)); }}}
              disabled={isToday}
              style={{ background:"none", border:"none", color: isToday ? S.dimmer : S.text, fontSize:20, cursor: isToday ? "not-allowed" : "pointer", padding:"4px 14px", lineHeight:1 }}>▶</button>
          </div>

          {/* Undo delete toast */}
          {pendingDelete && (
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)", borderRadius:10, padding:"10px 14px", marginBottom:10 }}>
              <span style={{ fontSize:12, color:S.dim }}>Entry deleted.</span>
              <button onClick={onUndoDelete} style={{ background:"none", border:`1px solid ${S.accent}`, color:S.accent, padding:"5px 12px", borderRadius:8, fontSize:11, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>UNDO</button>
            </div>
          )}

          {/* Macro summary */}
          <div style={{ background:S.panel, borderRadius:14, padding:18, marginBottom:14, border:"1px solid "+S.border }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
              <MacroRing label="CAL" cur={totals.cal} tgt={targets.cal} color={S.accent} unit="" />
              <MacroRing label="PRO" cur={totals.protein} tgt={targets.protein} color={S.green} unit="g" />
              <MacroRing label="CRB" cur={totals.carbs} tgt={targets.carbs} color={S.blue} unit="g" />
              <MacroRing label="FAT" cur={totals.fat} tgt={targets.fat} color={S.purple} unit="g" />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginTop:14, fontSize:11, color:S.dim, letterSpacing:0.5 }}>
              <div>{totals.cal} / {targets.cal} kcal</div>
              <div style={{ textAlign:"right" }}>
                {targets.cal - totals.cal > 0
                  ? <span style={{ color:S.accent }}>{targets.cal - totals.cal} REMAINING</span>
                  : <span style={{ color:S.red }}>+{Math.abs(targets.cal - totals.cal)} OVER</span>}
              </div>
            </div>
            {/* Fibre bar */}
            <div style={{ marginTop:12, paddingTop:12, borderTop:"1px solid "+S.border }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <div style={{ fontSize:10, letterSpacing:1.5, color:S.dim, fontWeight:700 }}>FIBRE</div>
                <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:fibreColor }}>{totals.fibre}g / {fibreTarget}g</div>
              </div>
              <div style={{ height:6, background:S.panel2, borderRadius:3, overflow:"hidden" }}>
                <div style={{ height:"100%", width:(fibrePct*100)+"%", background:fibreColor, borderRadius:3, transition:"width 0.4s" }} />
              </div>
            </div>
          </div>

          {/* Divider */}
          <div style={{ height:"2px", background:"rgba(255,255,255,0.35)", margin:"14px 0" }} />

          {/* Meals */}
          {meals.map(m => {
            const entries = day[m.k] || [];
            const mealTotal = entries.reduce((acc, e) => ({
              cal: acc.cal + (e.cal||0),
              protein: acc.protein + (e.protein||0),
            }), { cal:0, protein:0 });
            return (
              <div key={m.k} style={{ background:S.panel, borderRadius:12, padding:14, marginBottom:10, border:"1px solid "+S.border }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: entries.length > 0 ? 10 : 0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:14 }}>{m.icon}</span>
                    <span style={{ fontSize:11, fontWeight:700, letterSpacing:1.5, color:S.text }}>{m.label}</span>
                    {entries.length > 0 && (
                      <span style={{ fontSize:10, color:S.dim, marginLeft:4 }}>· {round(mealTotal.cal)} kcal · {round(mealTotal.protein,1)}P</span>
                    )}
                  </div>
                  <button onClick={() => onAddFood(m.k)} style={{ background:`${S.accent}1a`, border:`1px solid ${S.accent}55`, color:S.accent, padding:"6px 12px", borderRadius:8, fontSize:11, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
                    + ADD FOOD
                  </button>
                </div>
                {entries.filter(e => !(pendingDelete && pendingDelete.entry.id === e.id)).map(e => (
                  <div key={e.id} onClick={() => onEditEntry(e, m.k)}
                    style={{ padding:"8px 0", borderTop:"1px solid "+S.border, cursor:"pointer" }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, color:S.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.name}</div>
                        <div style={{ fontSize:10, color:S.dim, marginTop:2, fontFamily:"'DM Mono',monospace", letterSpacing:0.5 }}>
                          {e.displayQty && e.displayUnit
                            ? e.displayQty + " " + e.displayUnit
                            : (e.grams ? e.grams + "g" : "")}
                          {" · "}{round(e.cal)} kcal · {round(e.protein,1)}P · {round(e.carbs,1)}C · {round(e.fat,1)}F
                        </div>
                        {e.notes && <div style={{ fontSize:11, color:S.dim, marginTop:3, fontStyle:"italic" }}>{e.notes}</div>}
                      </div>
                      <button onClick={ev => { ev.stopPropagation(); onRequestDelete(m.k, e); }}
                        style={{ background:"none", border:"none", color:S.dimmer, fontSize:18, cursor:"pointer", padding:"4px 8px" }}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}

          {/* Empty state */}
          {!hasAnyEntry && (
            <div style={{ padding:"32px 20px", textAlign:"center", color:S.dim, fontSize:13 }}>
              {isToday ? "Log your first meal of the day." : "No entries for this day."}
            </div>
          )}
        </div>
      );
    }

    function MacroRing({ label, cur, tgt, color, unit }) {
      const pct = Math.min(1, tgt > 0 ? cur / tgt : 0);
      const r = 28, c = 2 * Math.PI * r;
      return (
        <div style={{ textAlign:"center" }}>
          <div style={{ position:"relative", width:70, height:70, margin:"0 auto" }}>
            <svg width="70" height="70" style={{ transform: "rotate(-90deg)" }}>
              <circle cx="35" cy="35" r={r} fill="none" stroke={S.border} strokeWidth="4" />
              <circle cx="35" cy="35" r={r} fill="none" stroke={color} strokeWidth="4" strokeLinecap="round"
                      strokeDasharray={c} strokeDashoffset={c * (1 - pct)} style={{ transition: "stroke-dashoffset 0.4s" }} />
            </svg>
            <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontSize:11, fontFamily:"'DM Mono',monospace" }}>
              <div style={{ color:S.text, fontWeight:700 }}>{round(cur)}</div>
              <div style={{ color:S.dim, fontSize:9 }}>{round(tgt)}{unit}</div>
            </div>
          </div>
          <div style={{ fontSize:9, letterSpacing:1.5, color:S.dim, marginTop:4, fontWeight:700 }}>{label}</div>
        </div>
      );
    }

    // ───────────────────── FOOD PICKER ─────────────────────
    function FoodPicker({ data, slot, apiKey, onMissingKey, onClose, onLog, onAddNewFood, onLogAll }) {
      const [query, setQuery] = useState("");
      const [mode, setMode] = useState("search"); // search | manual | scan | portion
      const [selectedFood, setSelectedFood] = useState(null);
      const searchRef = useRef(null);

      useEffect(() => {
        const t = setTimeout(() => { if (searchRef.current) searchRef.current.focus(); }, 100);
        return () => clearTimeout(t);
      }, [mode]);

      const results = useMemo(() => {
        const now = Date.now();
        return data.foods
          .map(f => ({ food: f, score: scoreFood(f, query, now) }))
          .filter(x => x.score >= 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, 60)
          .map(x => x.food);
      }, [data.foods, query]);

      const pickFood = (f) => {
        setSelectedFood(f);
        setMode("portion");
      };

      const handleManualSave = (food) => {
        const added = onAddNewFood(food);
        setSelectedFood(added);
        setMode("portion");
      };

      const handleScanResult = (food) => {
        const added = onAddNewFood(food);
        setSelectedFood(added);
        setMode("portion");
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:100, display:"flex", flexDirection:"column", paddingTop:"env(safe-area-inset-top)" }} onClick={onClose}>
          <div className="slideUp" style={{ background:S.bg, marginTop:"auto", borderTopLeftRadius:18, borderTopRightRadius:18, padding:"16px 16px 8px", maxHeight:"90vh", display:"flex", flexDirection:"column", borderTop:"1px solid "+S.border }} onClick={e => e.stopPropagation()}>
            {/* Drag handle */}
            <div style={{ width:40, height:4, background:S.dimmer, borderRadius:2, margin:"0 auto 12px" }} />

            {mode === "portion" && selectedFood && (
              <PortionAdjust
                food={selectedFood}
                slot={slot}
                onCancel={() => { setSelectedFood(null); setMode("search"); }}
                onLog={(grams, notes, preferredUnit) => onLog(selectedFood, grams, notes, preferredUnit)}
              />
            )}

            {mode === "manual" && (
              <ManualEntry
                onCancel={() => setMode("search")}
                onSave={handleManualSave}
              />
            )}

            {mode === "scan" && (
              <MealScan
                apiKey={apiKey}
                onMissingKey={onMissingKey}
                onCancel={() => setMode("search")}
                onResult={handleScanResult}
                onLogAll={onLogAll}
              />
            )}

            {mode === "search" && (
              <>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <div style={{ flex:1, position:"relative" }}>
                    <input
                      ref={searchRef}
                      type="text"
                      autoFocus
                      placeholder="Search foods…"
                      value={query}
                      onChange={e => setQuery(e.target.value)}
                      style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, borderRadius:10, padding:"12px 14px 12px 38px", color:S.text, fontSize:15, outline:"none" }}
                    />
                    <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", color:S.dim, fontSize:14 }}>🔍</span>
                  </div>
                  <button onClick={onClose} style={{ background:"none", border:"none", color:S.dim, fontSize:14, padding:"8px 4px", cursor:"pointer", letterSpacing:1 }}>
                    CANCEL
                  </button>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                  <button onClick={() => setMode("scan")} style={{ background:`${S.accent}14`, border:`1px solid ${S.accent}44`, color:S.accent, padding:"10px", borderRadius:10, fontSize:11, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
                    📷 SCAN MEAL
                  </button>
                  <button onClick={() => setMode("manual")} style={{ background:S.panel, border:"1px solid "+S.border, color:S.text, padding:"10px", borderRadius:10, fontSize:11, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
                    + MANUAL ENTRY
                  </button>
                </div>

                <div style={{ fontSize:9, letterSpacing:2, color:S.dim, padding:"4px 4px 8px" }}>
                  {query ? "MATCHES" : "RECENT & FREQUENT"} · {results.length}
                </div>

                <div style={{ flex:1, overflowY:"auto", paddingBottom:14 }}>
                  {results.length === 0 && (
                    <div style={{ padding:"40px 20px", textAlign:"center", color:S.dim, fontSize:13 }}>
                      No matches. Try a different term, scan, or add manually.
                    </div>
                  )}
                  {results.map(f => (
                    <button key={f.id} onClick={() => pickFood(f)} style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, borderRadius:10, padding:"10px 12px", marginBottom:6, textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, color:S.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                          {f.name}
                          {f.brand && <span style={{ color:S.dim, marginLeft:6, fontSize:11 }}>· {f.brand}</span>}
                        </div>
                        <div style={{ fontSize:10, color:S.dim, marginTop:2, fontFamily:"'DM Mono',monospace" }}>
                          per 100g: {round(f.per100g.cal)}kcal · {round(f.per100g.protein,1)}P · {round(f.per100g.carbs,1)}C · {round(f.per100g.fat,1)}F
                        </div>
                      </div>
                      {f.useCount > 0 && (
                        <div style={{ fontSize:9, color:S.accentDim, fontFamily:"'DM Mono',monospace", whiteSpace:"nowrap" }}>×{f.useCount}</div>
                      )}
                    </button>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ───────────────────── UNIT SELECTOR ─────────────────────
    function UnitSelector({ unit, onChange }) {
      return (
        <div style={{ display:"flex", gap:4 }}>
          {["g","oz","lb"].map(u => (
            <button key={u} onClick={() => onChange(u)}
              style={{ flex:1, padding:"8px 4px", background: unit===u ? `${S.accent}22` : S.panel2,
                border:`1px solid ${unit===u ? S.accent : S.border}`, color: unit===u ? S.accent : S.dim,
                borderRadius:8, fontSize:11, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
              {u}
            </button>
          ))}
        </div>
      );
    }

    // ───────────────────── EDIT ENTRY MODAL ─────────────────────
    function EditEntryModal({ entry, slot, data, onSave, onDelete, onClose }) {
      const food = data.foods.find(f => f.id === entry.foodId);
      const initUnit = entry.displayUnit || food?.preferredUnit || "g";
      const [unit, setUnit] = useState(initUnit);
      const [grams, setGrams] = useState(entry.grams || 100);
      const [notes, setNotes] = useState(entry.notes || "");

      const displayQty = gramsToUnit(grams, unit);

      const macros = useMemo(() => {
        if (food?.per100g) return scaleMacros(food.per100g, grams);
        // Proportional scaling from stored entry macros
        const ratio = entry.grams > 0 ? grams / entry.grams : 1;
        return {
          cal: round((entry.cal || 0) * ratio),
          protein: round((entry.protein || 0) * ratio, 1),
          carbs: round((entry.carbs || 0) * ratio, 1),
          fat: round((entry.fat || 0) * ratio, 1),
        };
      }, [food, grams, entry]);

      const handleSave = () => {
        const preferredUnit = unit !== "g" ? unit : null;
        onSave(slot, entry.id, {
          grams,
          ...(unit !== "g" ? { displayQty, displayUnit: unit } : { displayQty: undefined, displayUnit: undefined }),
          notes: notes.trim() || undefined,
          ...macros,
          ts: entry.ts, // preserve original timestamp
        }, preferredUnit, entry.foodId);
        onClose();
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.65)", zIndex:200, display:"flex", flexDirection:"column", paddingTop:"env(safe-area-inset-top)" }} onClick={onClose}>
          <div className="slideUp" style={{ background:S.bg, marginTop:"auto", borderTopLeftRadius:18, borderTopRightRadius:18, padding:"16px 16px 24px", maxHeight:"90vh", overflowY:"auto", borderTop:"1px solid "+S.border }} onClick={e => e.stopPropagation()}>
            <div style={{ width:40, height:4, background:S.dimmer, borderRadius:2, margin:"0 auto 12px" }} />
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim, textAlign:"center", marginBottom:14 }}>EDIT ENTRY · {slot ? slot.toUpperCase() : ""}</div>

            <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, padding:12, marginBottom:14 }}>
              <div style={{ fontSize:14, fontWeight:500, color:S.text }}>{entry.name}</div>
              {entry.brand && <div style={{ fontSize:11, color:S.dim, marginTop:2 }}>{entry.brand}</div>}
            </div>

            {/* Portion */}
            <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, padding:14, marginBottom:14 }}>
              <div style={{ fontSize:10, letterSpacing:2, color:S.dim, marginBottom:10 }}>PORTION</div>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <button onClick={() => setGrams(g => Math.max(1, g - 25))}
                  style={{ width:48, height:48, borderRadius:10, background:S.panel2, border:"1px solid "+S.border, color:S.text, fontSize:14, fontWeight:700, cursor:"pointer" }}>−25g</button>
                <input
                  type="number" inputMode="decimal"
                  value={displayQty}
                  onChange={e => setGrams(Math.max(1, unitToGrams(parseFloat(e.target.value) || 0, unit)))}
                  style={{ flex:1, background:S.panel2, border:"1px solid "+S.borderHi, borderRadius:10, padding:"12px 14px", color:S.text, fontSize:22, fontWeight:600, textAlign:"center", outline:"none" }}
                />
                <button onClick={() => setGrams(g => Math.max(1, g + 25))}
                  style={{ width:48, height:48, borderRadius:10, background:S.panel2, border:"1px solid "+S.border, color:S.text, fontSize:14, fontWeight:700, cursor:"pointer" }}>+25g</button>
              </div>
              <UnitSelector unit={unit} onChange={setUnit} />
            </div>

            {/* Macro preview */}
            <div style={{ background:`linear-gradient(135deg, ${S.accent}1a, ${S.accent}08)`, border:`1px solid ${S.accent}44`, borderRadius:12, padding:14, marginBottom:14 }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, textAlign:"center" }}>
                {[
                  { label:"KCAL", val: macros.cal, color: S.accent },
                  { label:"PRO", val: macros.protein, color: S.green, suf:"g" },
                  { label:"CRB", val: macros.carbs, color: S.blue, suf:"g" },
                  { label:"FAT", val: macros.fat, color: S.purple, suf:"g" },
                ].map(m => (
                  <div key={m.label}>
                    <div style={{ fontSize:20, fontWeight:600, color: m.color, fontFamily:"'DM Mono',monospace" }}>{m.val}<span style={{ fontSize:10, color:S.dim }}>{m.suf||""}</span></div>
                    <div style={{ fontSize:9, color:S.dim, letterSpacing:1.5, marginTop:2 }}>{m.label}</div>
                  </div>
                ))}
              </div>
            </div>

            <textarea
              placeholder="Notes (optional)…"
              value={notes}
              onChange={e => setNotes(e.target.value)}
              rows={2}
              style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, borderRadius:10, padding:"10px 12px", color:S.text, fontSize:13, outline:"none", resize:"none", marginBottom:10, fontFamily:"inherit" }}
            />

            <button onClick={handleSave}
              style={{ width:"100%", background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"14px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer", marginBottom:8 }}>
              SAVE CHANGES · {displayQty} {unit}
            </button>
            <button onClick={() => onDelete(slot, entry.id)}
              style={{ width:"100%", background:"rgba(248,113,113,0.1)", border:`1px solid ${S.red}55`, color:S.red, borderRadius:12, padding:"12px", fontSize:12, fontWeight:700, letterSpacing:1.5, cursor:"pointer", marginBottom:8 }}>
              DELETE ENTRY
            </button>
            <button onClick={onClose}
              style={{ width:"100%", background:"none", border:"none", color:S.dim, padding:"10px", fontSize:12, letterSpacing:1, cursor:"pointer" }}>
              CANCEL
            </button>
          </div>
        </div>
      );
    }

    // ───────────────────── PORTION ADJUST ─────────────────────
    function PortionAdjust({ food, slot, onCancel, onLog }) {
      const [unit, setUnit] = useState(food.preferredUnit || "g");
      const [grams, setGrams] = useState(food.refPortion?.grams || 100);
      const [notes, setNotes] = useState("");

      const displayQty = gramsToUnit(grams, unit);
      const macros = scaleMacros(food.per100g, grams);

      const presets = [
        { label: food.refPortion?.label || "100g", grams: food.refPortion?.grams || 100 },
        { label: "100g", grams: 100 },
        { label: "150g", grams: 150 },
        { label: "200g", grams: 200 },
      ].filter((p, i, arr) => arr.findIndex(x => x.grams === p.grams) === i);

      const handleQtyChange = (v) => {
        const g = unitToGrams(parseFloat(v) || 0, unit);
        setGrams(Math.max(1, g));
      };

      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <button onClick={onCancel} style={{ background:"none", border:"none", color:S.dim, fontSize:13, padding:"4px 0", cursor:"pointer", letterSpacing:1 }}>
              ← BACK
            </button>
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>PORTION · {slot ? slot.toUpperCase() : ""}</div>
            <div style={{ width:60 }} />
          </div>

          <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, padding:14, marginBottom:14 }}>
            <div style={{ fontSize:15, fontWeight:500, color:S.text, marginBottom:4 }}>{food.name}</div>
            {food.brand && <div style={{ fontSize:11, color:S.dim, marginBottom:8 }}>{food.brand}</div>}
            <div style={{ fontSize:10, color:S.dim, fontFamily:"'DM Mono',monospace" }}>
              per 100g: {round(food.per100g.cal)} kcal · {round(food.per100g.protein,1)}P · {round(food.per100g.carbs,1)}C · {round(food.per100g.fat,1)}F
            </div>
          </div>

          {/* Portion + unit */}
          <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, padding:14, marginBottom:14 }}>
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim, marginBottom:10 }}>PORTION</div>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <button onClick={() => setGrams(g => Math.max(1, g - 25))} style={{ width:48, height:48, borderRadius:10, background:S.panel2, border:"1px solid "+S.border, color:S.text, fontSize:14, fontWeight:700, cursor:"pointer" }}>−25g</button>
              <input
                type="number"
                inputMode="decimal"
                value={displayQty}
                onChange={e => handleQtyChange(e.target.value)}
                style={{ flex:1, background:S.panel2, border:"1px solid "+S.borderHi, borderRadius:10, padding:"12px 14px", color:S.text, fontSize:22, fontWeight:600, textAlign:"center", outline:"none" }}
              />
              <button onClick={() => setGrams(g => Math.max(1, g + 25))} style={{ width:48, height:48, borderRadius:10, background:S.panel2, border:"1px solid "+S.border, color:S.text, fontSize:14, fontWeight:700, cursor:"pointer" }}>+25g</button>
            </div>
            <UnitSelector unit={unit} onChange={setUnit} />
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:8 }}>
              {presets.map(p => (
                <button key={p.label} onClick={() => setGrams(p.grams)}
                  style={{ flex:1, background: grams === p.grams ? `${S.accent}22` : S.panel2, border:`1px solid ${grams === p.grams ? S.accent : S.border}`, color: grams === p.grams ? S.accent : S.dim, padding:"8px 6px", borderRadius:8, fontSize:10, fontWeight:600, letterSpacing:0.5, cursor:"pointer", whiteSpace:"nowrap", minWidth:0, overflow:"hidden", textOverflow:"ellipsis" }}>
                  {unit === "g" ? p.label : gramsToUnit(p.grams, unit) + " " + unit}
                </button>
              ))}
            </div>
          </div>

          {/* Macro preview */}
          <div style={{ background:`linear-gradient(135deg, ${S.accent}1a, ${S.accent}08)`, border:`1px solid ${S.accent}44`, borderRadius:12, padding:14, marginBottom:14 }}>
            <div style={{ fontSize:10, letterSpacing:2, color:S.accent, marginBottom:10 }}>WILL LOG</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, textAlign:"center" }}>
              {[
                { label:"KCAL", val: macros.cal, color: S.accent },
                { label:"PRO", val: macros.protein, color: S.green, suf:"g" },
                { label:"CRB", val: macros.carbs, color: S.blue, suf:"g" },
                { label:"FAT", val: macros.fat, color: S.purple, suf:"g" },
              ].map(m => (
                <div key={m.label}>
                  <div style={{ fontSize:22, fontWeight:600, color: m.color, fontFamily:"'DM Mono',monospace" }}>{m.val}<span style={{ fontSize:11, color:S.dim }}>{m.suf||""}</span></div>
                  <div style={{ fontSize:9, color:S.dim, letterSpacing:1.5, marginTop:2 }}>{m.label}</div>
                </div>
              ))}
            </div>
          </div>

          <textarea
            placeholder="Notes (optional)…"
            value={notes}
            onChange={e => setNotes(e.target.value)}
            rows={2}
            style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, borderRadius:10, padding:"10px 12px", color:S.text, fontSize:13, outline:"none", resize:"none", marginBottom:10, fontFamily:"inherit" }}
          />
          <button onClick={() => onLog(grams, notes.trim() || undefined, unit !== "g" ? unit : undefined)}
            style={{ width:"100%", background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"16px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer", marginBottom:8 }}>
            LOG {displayQty} {unit}
          </button>
        </div>
      );
    }

    // ───────────────────── MANUAL ENTRY ─────────────────────
    function ManualEntry({ onCancel, onSave }) {
      const [name, setName] = useState("");
      const [brand, setBrand] = useState("");
      const [refUnit, setRefUnit] = useState("g");
      const [refGrams, setRefGrams] = useState(100);  // always stored in grams
      const [refDisplayQty, setRefDisplayQty] = useState(100);
      const [refLabel, setRefLabel] = useState("");
      const [refCal, setRefCal] = useState("");
      const [refProtein, setRefProtein] = useState("");
      const [refCarbs, setRefCarbs] = useState("");
      const [refFat, setRefFat] = useState("");
      const [refFibre, setRefFibre] = useState("");

      const [searchQ, setSearchQ] = useState("");
      const [searching, setSearching] = useState(false);
      const [searchResults, setSearchResults] = useState(null); // null=idle, []=no results
      const [searchErr, setSearchErr] = useState("");

      const OFF_CACHE_PREFIX = "off_cache_";

      const doSearch = async () => {
        const q = searchQ.trim();
        if (!q) return;
        setSearching(true);
        setSearchErr("");
        setSearchResults(null);
        try {
          const cacheKey = OFF_CACHE_PREFIX + q.toLowerCase();
          const cached = localStorage.getItem(cacheKey);
          if (cached) {
            setSearchResults(JSON.parse(cached));
            setSearching(false);
            return;
          }
          const url = "https://world.openfoodfacts.org/cgi/search.pl?search_terms=" +
            encodeURIComponent(q) + "&search_simple=1&action=process&json=1&page_size=8&fields=product_name,brands,nutriments";
          const res = await fetch(url);
          if (!res.ok) throw new Error("Network error");
          const json = await res.json();
          const results = (json.products || [])
            .filter(p => p.product_name && p.nutriments && p.nutriments["energy-kcal_100g"] != null)
            .slice(0, 5)
            .map(p => ({
              name: p.product_name,
              brand: p.brands || "",
              cal: Math.round(p.nutriments["energy-kcal_100g"] || 0),
              protein: round(p.nutriments["proteins_100g"] || 0, 1),
              carbs: round(p.nutriments["carbohydrates_100g"] || 0, 1),
              fat: round(p.nutriments["fat_100g"] || 0, 1),
              fibre: round(p.nutriments["fiber_100g"] || p.nutriments["fibre_100g"] || 0, 1),
            }));
          localStorage.setItem(cacheKey, JSON.stringify(results));
          setSearchResults(results);
        } catch(e) {
          setSearchErr("Search failed — check connection");
        }
        setSearching(false);
      };

      const applyResult = (r) => {
        setName(r.name);
        setBrand(r.brand);
        setRefGrams(100);
        setRefDisplayQty(100);
        setRefUnit("g");
        setRefLabel("100g");
        setRefCal(String(r.cal));
        setRefProtein(String(r.protein));
        setRefCarbs(String(r.carbs));
        setRefFat(String(r.fat));
        setRefFibre(String(r.fibre));
        setSearchResults(null);
        setSearchQ("");
      };

      const valid = name.trim() && refGrams > 0 && (refCal || refProtein || refCarbs || refFat);

      const submit = () => {
        if (!valid) return;
        const cal = parseFloat(refCal) || 0;
        const protein = parseFloat(refProtein) || 0;
        const carbs = parseFloat(refCarbs) || 0;
        const fat = parseFloat(refFat) || 0;
        const fibre = parseFloat(refFibre) || 0;
        const per100g = {
          cal: round(cal * 100 / refGrams),
          protein: round(protein * 100 / refGrams, 1),
          carbs: round(carbs * 100 / refGrams, 1),
          fat: round(fat * 100 / refGrams, 1),
          fibre: round(fibre * 100 / refGrams, 1),
        };
        const food = {
          id: uid("f"),
          name: name.trim(),
          brand: brand.trim(),
          refPortion: { grams: refGrams, label: refLabel.trim() || (refGrams + "g") },
          per100g,
          category: "manual",
          tags: [],
          source: "manual",
        };
        onSave(food);
      };

      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <button onClick={onCancel} style={{ background:"none", border:"none", color:S.dim, fontSize:13, cursor:"pointer", letterSpacing:1 }}>← BACK</button>
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>NEW FOOD</div>
            <div style={{ width:50 }} />
          </div>

          <div style={{ flex:1, overflowY:"auto", paddingBottom:14, maxHeight:"calc(90vh - 100px)" }}>

            {/* ── Internet search ── */}
            <div style={{ marginBottom:14 }}>
              <label style={{ display:"block", fontSize:9, letterSpacing:1.5, color:S.dim, marginBottom:4 }}>SEARCH OPEN FOOD FACTS</label>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type="text"
                  value={searchQ}
                  onChange={e => setSearchQ(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && doSearch()}
                  placeholder="e.g., Greek yogurt"
                  style={{ flex:1, background:S.panel, border:"1px solid "+S.border, borderRadius:8, padding:"11px 12px", color:S.text, fontSize:14, outline:"none" }}
                />
                <button onClick={doSearch} disabled={searching || !searchQ.trim()} style={{ background:S.accent, color:"#0a0c0f", border:"none", borderRadius:8, padding:"0 16px", fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>
                  {searching ? "…" : "🔍"}
                </button>
              </div>
              {searchErr && <div style={{ fontSize:11, color:S.red, marginTop:6 }}>{searchErr}</div>}
              {searchResults !== null && searchResults.length === 0 && (
                <div style={{ fontSize:11, color:S.dim, marginTop:6 }}>No results — fill in manually below</div>
              )}
              {searchResults && searchResults.length > 0 && (
                <div style={{ marginTop:8, border:"1px solid "+S.border, borderRadius:10, overflow:"hidden" }}>
                  {searchResults.map((r, i) => (
                    <button key={i} onClick={() => applyResult(r)} style={{ display:"block", width:"100%", background: i % 2 === 0 ? S.panel : S.panel2, border:"none", borderBottom: i < searchResults.length-1 ? "1px solid "+S.border : "none", padding:"10px 12px", textAlign:"left", cursor:"pointer" }}>
                      <div style={{ fontSize:13, color:S.text, fontWeight:600, marginBottom:2 }}>{r.name}{r.brand ? <span style={{ fontWeight:400, color:S.dim }}> · {r.brand}</span> : ""}</div>
                      <div style={{ fontSize:10, color:S.dim, letterSpacing:0.5 }}>
                        {r.cal} kcal · {r.protein}g P · {r.carbs}g C · {r.fat}g F{r.fibre ? " · "+r.fibre+"g fibre" : ""} <span style={{ color:S.dimmer }}>per 100g</span>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div style={{ borderTop:"1px solid "+S.border, marginBottom:14 }} />

            <Field label="NAME *" value={name} setValue={setName} placeholder="e.g., Tuscan kale salad" />
            <Field label="BRAND" value={brand} setValue={setBrand} placeholder="optional" />
            <div style={{ marginBottom:8 }}>
              <label style={{ display:"block", fontSize:9, letterSpacing:1.5, color:S.dim, marginBottom:4 }}>REF PORTION *</label>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type="number" inputMode="decimal"
                  value={refDisplayQty}
                  onChange={e => {
                    const qty = parseFloat(e.target.value) || 0;
                    setRefDisplayQty(e.target.value);
                    setRefGrams(Math.max(1, unitToGrams(qty, refUnit)));
                  }}
                  style={{ flex:1, background:S.panel, border:"1px solid "+S.border, borderRadius:8, padding:"11px 12px", color:S.text, fontSize:14, fontWeight:600, outline:"none", textAlign:"center" }}
                />
                <UnitSelector unit={refUnit} onChange={u => {
                  setRefUnit(u);
                  setRefDisplayQty(gramsToUnit(refGrams, u));
                }} />
              </div>
            </div>
            <Field label="REF LABEL" value={refLabel} setValue={setRefLabel} placeholder="e.g., 1 cup" />
            <div style={{ fontSize:10, color:S.dim, marginBottom:8, letterSpacing:1 }}>
              MACROS FOR {refGrams}g
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:6 }}>
              <Field compact label="KCAL" value={refCal} setValue={setRefCal} type="number" />
              <Field compact label="P (g)" value={refProtein} setValue={setRefProtein} type="number" />
              <Field compact label="C (g)" value={refCarbs} setValue={setRefCarbs} type="number" />
              <Field compact label="F (g)" value={refFat} setValue={setRefFat} type="number" />
            </div>
            <div style={{ marginBottom:14 }}>
              <Field compact label="FIBRE (g)" value={refFibre} setValue={setRefFibre} type="number" />
            </div>
            <button onClick={submit} disabled={!valid} style={{ width:"100%", background: valid ? S.accent : S.panel2, color: valid ? "#0a0c0f" : S.dim, border:"none", borderRadius:12, padding:"14px", fontSize:12, fontWeight:700, letterSpacing:1.5, cursor: valid ? "pointer" : "not-allowed" }}>
              SAVE & CHOOSE PORTION
            </button>
          </div>
        </div>
      );
    }

    function Field({ label, value, setValue, placeholder, type="text", compact=false }) {
      return (
        <div style={{ marginBottom: compact ? 0 : 8 }}>
          <label style={{ display:"block", fontSize:9, letterSpacing:1.5, color:S.dim, marginBottom:4 }}>{label}</label>
          <input
            type={type}
            inputMode={type === "number" ? "decimal" : "text"}
            value={value}
            onChange={e => setValue(e.target.value)}
            placeholder={placeholder}
            style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, borderRadius:8, padding: compact ? "10px 8px" : "11px 12px", color:S.text, fontSize: compact ? 14 : 14, fontWeight: compact ? 600 : 400, outline:"none", textAlign: compact ? "center" : "left" }}
          />
        </div>
      );
    }

    // ───────────────────── MEAL SCAN ─────────────────────
    function MealScan({ apiKey, onMissingKey, onCancel, onResult, onLogAll }) {
      const [phase, setPhase] = useState("capture"); // capture | analyzing | review | error
      const [image, setImage] = useState(null);
      const [results, setResults] = useState([]);
      const [error, setError] = useState("");
      const [refreshingId, setRefreshingId] = useState(null);
      const cameraRef = useRef(null);
      const fileRef = useRef(null);

      useEffect(() => {
        if (!apiKey) { onMissingKey(); }
      }, []);

      const handleFile = (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          setImage(reader.result);
          analyze(reader.result);
        };
        reader.readAsDataURL(f);
      };

      const analyze = async (dataUrl) => {
        setPhase("analyzing");
        try {
          const base64 = dataUrl.split(",")[1];
          const mimeType = dataUrl.match(/data:(.*?);/)[1];
