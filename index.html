    // ═══ DRIVE API ════════════════════════════════════════════════════════
    let accessToken = null;

    const driveCall = async (url, options = {}) => {
      const resp = await fetch(url, {
        ...options,
        headers: { ...options.headers, Authorization: `Bearer ${accessToken}` }
      });
      if (resp.status === 401) {
        accessToken = null;
        throw new Error('TOKEN_EXPIRED');
      }
      if (!resp.ok) throw new Error(`Drive API ${resp.status}: ${await resp.text()}`);
      return resp;
    };

    const findFile = async () => {
      const q = encodeURIComponent(`name='${FILE_NAME}' and trashed=false`);
      const resp = await driveCall(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)`);
      const data = await resp.json();
      return data.files?.[0] || null;
    };

    const createDriveFile = async (data) => {
      const metadata = { name: FILE_NAME, parents: [DRIVE_FOLDER_ID], mimeType: 'application/json' };
      const boundary = '-------314159265358979323846';
      const body =
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(metadata)}\r\n` +
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(data)}\r\n--${boundary}--`;
      const resp = await driveCall('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { 'Content-Type': `multipart/related; boundary="${boundary}"` },
        body,
      });
      const result = await resp.json();
      return result.id;
    };

    const readDriveFile = async (id) => {
      const resp = await driveCall(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
      return resp.json();
    };

    const updateDriveFile = async (id, data) => {
      await driveCall(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    };

    // ═══ ANTHROPIC API ════════════════════════════════════════════════════
    const SINGLE_PROMPT = `You are analyzing a photo of ONE food item being added to a home pantry inventory for an animal-based eating athlete (Italian heritage, quality-focused).

Identify:
1. **name** - concise product name. Include brand only for distinctive items. Examples: "Free-range chicken thighs", "Heinz organic ketchup", "Parmigiano Reggiano wedge"
2. **cat** - storage category:
   - "FREEZER" - frozen items, raw meat/fish for freezing
   - "FRIDGE" - dairy, fresh meat, opened condiments, fresh produce needing cold
   - "PANTRY" - shelf-stable, dry goods, unopened oils/canned/jarred
3. **qty** - best estimate (e.g., "1 pkg", "500g", "1 lb", "1 bottle", "2 cans", "~12 pcs")
4. **expiry** - if visible on packaging, format YYYY-MM-DD. Otherwise null.
5. **status** - default "good" unless visibly low quantity or near-expiry, then "low" or "urgent"

Respond with ONLY valid JSON, no preamble, no markdown fences:
{"name":"string","cat":"FREEZER|FRIDGE|PANTRY","qty":"string","expiry":null,"status":"good","confidence":"high|medium|low","notes":"brief or empty"}`;

    const BULK_PROMPT = `You are analyzing a photo of MULTIPLE food items in a home freezer, fridge, or pantry for inventory tracking.

For EACH clearly visible item, identify:
1. **name** - concise product name
2. **cat** - "FREEZER", "FRIDGE", or "PANTRY" based on apparent storage context
3. **qty** - count or estimate ("1 pkg", "3 jars", "~6 pcs", etc.)
4. **status** - "good" by default

Rules:
- List only items you can clearly identify. Don't guess at obscured/blurry items.
- For multiples of the same item (e.g., 4 packs of chicken thighs), list as ONE entry with appropriate qty.
- Use the storage context to set category — if photo shows a freezer, items are FREEZER unless clearly different.

Respond with ONLY valid JSON, no preamble, no markdown fences:
{"items":[{"name":"string","cat":"FREEZER|FRIDGE|PANTRY","qty":"string","status":"good","confidence":"high|medium|low"}],"totalCount":number,"scanNotes":"brief observation"}`;

    const callClaude = async (apiKey, b64, mode) => {
      const prompt = mode === 'single' ? SINGLE_PROMPT : BULK_PROMPT;
      const maxTokens = mode === 'single' ? 800 : 3000;
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: maxTokens,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message || 'Claude API error');
      const text = data.content?.find(c => c.type === 'text')?.text || '';
      const cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
      return JSON.parse(cleaned);
    };

    // ═══ COMPONENTS ═══════════════════════════════════════════════════════
    function Arc({ val, max, color, size=72, thick=6, children }) {
      const r = (size - thick * 2) / 2;
      const c = 2 * Math.PI * r;
      const pct = Math.min(val / max, 1);
      const off = c - pct * c;
      return (
        <div style={{ position:"relative", width:size, height:size, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <svg width={size} height={size} style={{ position:"absolute", transform:"rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={thick} />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={thick}
              strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
              style={{ transition:"stroke-dashoffset 0.5s cubic-bezier(.4,0,.2,1)", filter:`drop-shadow(0 0 6px ${color}88)` }} />
          </svg>
          <div style={{ position:"relative", zIndex:1, textAlign:"center" }}>{children}</div>
        </div>
      );
    }

    function Camera({ onCapture, onClose, mode }) {
      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const [err, setErr] = useState(null);
      const [ready, setReady] = useState(false);

      useEffect(() => {
        (async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
              audio: false
            });
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.onloadedmetadata = () => setReady(true);
            }
          } catch (e) {
            setErr(e.message || "Camera access denied");
          }
        })();
        return () => streamRef.current?.getTracks().forEach(t => t.stop());
      }, []);

      const snap = () => {
        const v = videoRef.current;
        if (!v) return;
        const c = document.createElement("canvas");
        const maxDim = 1280;
        const scale = Math.min(1, maxDim / Math.max(v.videoWidth, v.videoHeight));
        c.width = v.videoWidth * scale;
        c.height = v.videoHeight * scale;
        c.getContext("2d").drawImage(v, 0, 0, c.width, c.height);
        const b64 = c.toDataURL("image/jpeg", 0.82).split(",")[1];
        onCapture(b64);
      };

      const label = mode === 'single' ? 'ADD SINGLE ITEM' : 'BULK PANTRY SCAN';
      const hint = mode === 'single'
        ? 'AIM AT ONE ITEM · LABEL UP IF POSSIBLE'
        : 'CAPTURE FREEZER / FRIDGE / PANTRY SHELF';

      return (
        <div style={{ position:"fixed", inset:0, background:"#000", zIndex:100, display:"flex", flexDirection:"column" }}>
          <div style={{ padding:"16px", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(0,0,0,0.7)" }}>
            <span style={{ color:"#fff", fontSize:13, fontFamily:"'DM Mono',monospace", letterSpacing:1.5 }}>📷 {label}</span>
            <button onClick={onClose} style={{ background:"none", border:"none", color:"#fff", fontSize:24, cursor:"pointer" }}>×</button>
          </div>
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
            {err ? (
              <div style={{ color:"#f87171", padding:20, textAlign:"center" }}>
                <div style={{ fontSize:14, marginBottom:8 }}>⚠ Camera unavailable</div>
                <div style={{ fontSize:12, opacity:0.7 }}>{err}</div>
              </div>
            ) : (
              <video ref={videoRef} autoPlay playsInline muted style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain" }} />
            )}
            {ready && !err && (
              <div style={{ position:"absolute", inset:"10%", border:"2px solid rgba(200,169,110,0.5)", borderRadius:16, pointerEvents:"none" }}>
                <div style={{ position:"absolute", top:-1, left:-1, width:24, height:24, borderTop:"3px solid #c8a96e", borderLeft:"3px solid #c8a96e", borderTopLeftRadius:16 }} />
                <div style={{ position:"absolute", top:-1, right:-1, width:24, height:24, borderTop:"3px solid #c8a96e", borderRight:"3px solid #c8a96e", borderTopRightRadius:16 }} />
                <div style={{ position:"absolute", bottom:-1, left:-1, width:24, height:24, borderBottom:"3px solid #c8a96e", borderLeft:"3px solid #c8a96e", borderBottomLeftRadius:16 }} />
                <div style={{ position:"absolute", bottom:-1, right:-1, width:24, height:24, borderBottom:"3px solid #c8a96e", borderRight:"3px solid #c8a96e", borderBottomRightRadius:16 }} />
              </div>
            )}
          </div>
          <div style={{ padding:"20px 16px 32px", background:"rgba(0,0,0,0.7)", textAlign:"center" }}>
            <div style={{ color:"#8a8f9a", fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:1, marginBottom:14 }}>{hint}</div>
            <button onClick={snap} disabled={!ready || err}
              style={{ width:72, height:72, borderRadius:"50%", background: ready && !err ? "#c8a96e" : "#3a3f4a",
                border:"4px solid rgba(255,255,255,0.2)", cursor: ready && !err ? "pointer" : "not-allowed",

            </button>
          </div>
        </div>
      );
    }

    function SingleResult({ result, onConfirm, onCancel }) {
      const [item, setItem] = useState({

            </div>
            {result.notes && (

            {result.expiry && (

            <input value={item.name} onChange={e => setItem(p => ({...p, name:e.target.value}))}

            <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim, marginBottom:6 }}>CATEGORY</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:14 }}>
              {["FREEZER","FRIDGE","PANTRY"].map(c => (
                <button key={c} onClick={() => setItem(p => ({...p, cat:c}))}
                  style={{ padding:"10px", borderRadius:8, fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:1, fontWeight:700, cursor:"pointer",
                    border:`1px solid ${item.cat===c?S.accent:S.border}`,
                    background:item.cat===c?`${S.accent}22`:"transparent",
                    color:item.cat===c?S.accent:S.dim }}>
                  {c}
                </button>
              ))}
            </div>
            <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim, marginBottom:6 }}>QUANTITY</div>
            <input value={item.qty} onChange={e => setItem(p => ({...p, qty:e.target.value}))}
              placeholder="e.g. 2 lbs, 6 pkg, 1 jar"
              style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:`1px solid ${S.border}`, borderRadius:10, padding:"10px 14px", color:S.text, fontSize:13, outline:"none", marginBottom:14 }} />
            <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim, marginBottom:6 }}>STATUS</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:20 }}>
              {[["good","● GOOD",S.green],["low","● LOW",S.yellow],["urgent","▲ USE FIRST",S.orange]].map(([v,l,c]) => (
                <button key={v} onClick={() => setItem(p => ({...p, status:v}))}
                  style={{ padding:"9px 4px", borderRadius:8, fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:0.5, fontWeight:700, cursor:"pointer",
                    border:`1px solid ${item.status===v?c:S.border}`,
                    background:item.status===v?`${c}22`:"transparent",
                    color:item.status===v?c:S.dim }}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => onConfirm(item)}
                style={{ flex:2, padding:"13px", borderRadius:12, background:S.accent, color:"#0a0c0f", fontWeight:800, fontSize:13, border:"none", cursor:"pointer", letterSpacing:0.5 }}>
                ADD TO PANTRY
              </button>
              <button onClick={onCancel}
                style={{ flex:1, padding:"13px", borderRadius:12, background:"rgba(255,255,255,0.06)", color:S.dim, fontSize:13, border:"none", cursor:"pointer" }}>
                CANCEL
              </button>
            </div>
          </div>
        </div>
      );
    }

    function BulkResult({ result, onConfirm, onCancel }) {
      const [items, setItems] = useState(
        (result.items || []).map((i, idx) => ({ ...i, _id: idx, _selected: true }))
      );
      const selectedCount = items.filter(i => i._selected).length;
      const update = (id, patch) => setItems(p => p.map(i => i._id === id ? {...i, ...patch} : i));
      const toggleAll = () => {
        const allSelected = items.every(i => i._selected);
        setItems(p => p.map(i => ({...i, _selected: !allSelected})));
      };

      return (
        <div style={{ position:"fixed", inset:0, background:S.bg, zIndex:101, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto" }}>
          <div style={{ padding:"14px 16px", background:S.card, borderBottom:`1px solid ${S.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim }}>BULK SCAN RESULT</div>
              <div style={{ fontSize:16, fontWeight:700, marginTop:2 }}>{result.totalCount || items.length} items detected</div>
            </div>
            <button onClick={onCancel} style={{ background:"none", border:"none", color:S.dim, fontSize:24, cursor:"pointer" }}>×</button>
          </div>
          {result.scanNotes && (
            <div style={{ background:`${S.accent}10`, padding:"10px 16px", fontSize:11, color:S.accent, lineHeight:1.5, borderBottom:`1px solid ${S.border}` }}>
              💡 {result.scanNotes}
            </div>
          )}
          <div style={{ padding:"10px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${S.border}` }}>
            <button onClick={toggleAll} style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1, color:S.accent, background:"none", border:"none", cursor:"pointer", fontWeight:700 }}>
              {items.every(i => i._selected) ? "DESELECT ALL" : "SELECT ALL"}
            </button>
            <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1, color:S.dim }}>
              {selectedCount}/{items.length} SELECTED
            </span>
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"8px 16px 16px" }}>
            {items.map(item => (
              <div key={item._id} style={{ background:item._selected?S.card:"transparent", border:`1px solid ${item._selected?S.border:"rgba(255,255,255,0.03)"}`, borderRadius:12, padding:12, marginBottom:8, opacity:item._selected?1:0.5 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div onClick={() => update(item._id, { _selected: !item._selected })}
                    style={{ width:22, height:22, borderRadius:4, flexShrink:0, cursor:"pointer",
                      border:item._selected?`2px solid ${S.accent}`:`2px solid ${S.border}`,
                      background:item._selected?S.accent:"transparent",
                      display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {item._selected && <span style={{ fontSize:12, color:"#000", fontWeight:900 }}>✓</span>}
                  </div>
                  <input value={item.name} onChange={e => update(item._id, { name: e.target.value })}
                    disabled={!item._selected}
                    style={{ flex:1, background:"rgba(255,255,255,0.04)", border:`1px solid ${S.border}`, borderRadius:8, padding:"7px 10px", color:S.text, fontSize:13, outline:"none" }} />
                </div>
                <div style={{ display:"flex", gap:6 }}>
                  <select value={item.cat} onChange={e => update(item._id, { cat: e.target.value })}
                    disabled={!item._selected}
                    style={{ flex:1, background:"rgba(255,255,255,0.04)", border:`1px solid ${S.border}`, borderRadius:8, padding:"7px 8px", color:S.text, fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:0.5, outline:"none" }}>
                    <option value="FREEZER">FREEZER</option>
                    <option value="FRIDGE">FRIDGE</option>
                    <option value="PANTRY">PANTRY</option>
                  </select>
                  <input value={item.qty} onChange={e => update(item._id, { qty: e.target.value })}
                    disabled={!item._selected}
                    placeholder="qty"
                    style={{ flex:1, background:"rgba(255,255,255,0.04)", border:`1px solid ${S.border}`, borderRadius:8, padding:"7px 10px", color:S.text, fontSize:12, outline:"none" }} />
                </div>
              </div>
            ))}
          </div>
          <div style={{ padding:"12px 16px", background:S.card, borderTop:`1px solid ${S.border}`, display:"flex", gap:8 }}>
            <button onClick={() => onConfirm(items.filter(i => i._selected))} disabled={selectedCount === 0}
              style={{ flex:2, padding:"14px", borderRadius:12, background: selectedCount > 0 ? S.accent : "rgba(255,255,255,0.08)", color: selectedCount > 0 ? "#0a0c0f" : S.dim, fontWeight:800, fontSize:13, border:"none", cursor: selectedCount > 0 ? "pointer" : "not-allowed", letterSpacing:0.5 }}>
              ADD {selectedCount} ITEM{selectedCount === 1 ? "" : "S"}
            </button>
            <button onClick={onCancel}
              style={{ flex:1, padding:"14px", borderRadius:12, background:"rgba(255,255,255,0.06)", color:S.dim, fontSize:13, border:"none", cursor:"pointer" }}>
              CANCEL
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const now = new Date();
      const todayKey = now.toISOString().slice(0,10);
      const hc = isHighCarb(now);
      const tgt = hc ? TARGETS.high : TARGETS.low;

      const [authed, setAuthed] = useState(false);
      const [authError, setAuthError] = useState(null);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [lastSync, setLastSync] = useState(null);

      const [tab, setTab] = useState("today");
      const [logs, setLogs] = useState({});
      const [grocery, setGrocery] = useState(GROCERY_SEED);
      const [pantry, setPantry] = useState(PANTRY_SEED);
      const [newFood, setNewFood] = useState({ meal:"lunch", name:"", cal:"", protein:"", carbs:"", fat:"" });
      const [modal, setModal] = useState(false);
      const [showSettings, setShowSettings] = useState(false);

      const [apiKey, setApiKey] = useState(() => localStorage.getItem('anthropic-key') || '');
      const [tempKey, setTempKey] = useState('');
      const [showKeyInput, setShowKeyInput] = useState(false);
      const [keyVisible, setKeyVisible] = useState(false);

      const [camera, setCamera] = useState(false);
      const [scanMode, setScanMode] = useState('single');
      const [scanning, setScanning] = useState(false);
      const [scanError, setScanError] = useState(null);
      const [singleResult, setSingleResult] = useState(null);
      const [bulkResult, setBulkResult] = useState(null);

      const saveTimeoutRef = useRef(null);
      const dataLoadedRef = useRef(false);

      useEffect(() => {
        const initAuth = () => {
          if (typeof google === 'undefined' || !google.accounts) {
            setTimeout(initAuth, 200);
            return;
          }
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: DRIVE_SCOPE,
            callback: (resp) => {
              if (resp.error) { setAuthError(`Sign-in failed: ${resp.error}`); return; }
              accessToken = resp.access_token;
              setAuthError(null);
              setAuthed(true);
              loadData();
            },
            error_callback: (err) => setAuthError(`Auth error: ${err.type || err.message || 'unknown'}`)
          });
          setLoading(false);
        };
        initAuth();
      }, []);

      const loadData = async () => {
        setLoading(true);
        try {
          const file = await findFile();
          if (file) {
            fileId = file.id;
            const data = await readDriveFile(file.id);
            if (data.logs) setLogs(data.logs);
            if (data.grocery) setGrocery(data.grocery);
            if (data.pantry) setPantry(data.pantry);
            setLastSync(new Date());
          } else {
            const initialData = { version: 1, lastModified: new Date().toISOString(), logs: {}, grocery: GROCERY_SEED, pantry: PANTRY_SEED };
            fileId = await createDriveFile(initialData);
            setLastSync(new Date());
          }
          dataLoadedRef.current = true;
        } catch (e) {
          if (e.message === 'TOKEN_EXPIRED') tokenClient?.requestAccessToken();
          else setAuthError(`Load failed: ${e.message}`);
        } finally {
          setLoading(false);
        }
      };

      const saveData = useCallback(async () => {
        if (!fileId || !accessToken) return;
        setSyncing(true);
        try {
          const data = { version: 1, lastModified: new Date().toISOString(), logs, grocery, pantry };
          await updateDriveFile(fileId, data);
          setLastSync(new Date());
        } catch (e) {
          if (e.message === 'TOKEN_EXPIRED') tokenClient?.requestAccessToken();
          else console.error('Save failed:', e);
        } finally {
          setSyncing(false);
        }
      }, [logs, grocery, pantry]);

      useEffect(() => {
        if (!dataLoadedRef.current) return;
        if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(saveData, 1500);
        return () => { if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); };
      }, [logs, grocery, pantry, saveData]);

      const signIn = () => tokenClient?.requestAccessToken();
      const signOut = () => {
        if (accessToken) google.accounts.oauth2.revoke(accessToken);
        accessToken = null; fileId = null;
        setAuthed(false);
        setLogs({}); setGrocery(GROCERY_SEED); setPantry(PANTRY_SEED);
        dataLoadedRef.current = false;
      };

      const saveApiKey = () => {
        if (!tempKey.trim()) return;
        localStorage.setItem('anthropic-key', tempKey.trim());
        setApiKey(tempKey.trim());
        setTempKey('');
        setShowKeyInput(false);
      };
      const clearApiKey = () => {
        localStorage.removeItem('anthropic-key');
        setApiKey('');
      };

      const startScan = (mode) => {
        if (!apiKey) {
          setShowSettings(true);
          setShowKeyInput(true);
          return;
        }
        setScanMode(mode);
        setScanError(null);
        setCamera(true);
      };

      const handleCapture = async (b64) => {
        setCamera(false);
        setScanning(true);
        setScanError(null);
        try {
          const result = await callClaude(apiKey, b64, scanMode);
          if (scanMode === 'single') setSingleResult(result);
          else setBulkResult(result);
        } catch (e) {
          setScanError(e.message || 'Scan failed');
        } finally {
          setScanning(false);
        }
      };

      const addPantryItem = (item) => {
        const nextId = Math.max(0, ...pantry.map(p => p.id)) + 1;
        setPantry(prev => [...prev, {
          id: nextId,
          cat: item.cat,
          item: item.name,
          qty: item.qty || '1',
          status: item.status || 'good',
        }]);
        setSingleResult(null);
      };

      const addBulkItems = (selected) => {
        let nextId = Math.max(0, ...pantry.map(p => p.id));
        const toAdd = selected.map(s => ({
          id: ++nextId,
          cat: s.cat,
          item: s.name,
          qty: s.qty || '1',
          status: s.status || 'good',
        }));
        setPantry(prev => [...prev, ...toAdd]);
        setBulkResult(null);
      };

      const todayLog = logs[todayKey] || { breakfast:[], lunch:[], dinner:[], snacks:[] };
      const all = Object.values(todayLog).flat();
      const tot = all.reduce((a,f) => ({
        cal:a.cal+(+f.cal||0), protein:a.protein+(+f.protein||0), carbs:a.carbs+(+f.carbs||0), fat:a.fat+(+f.fat||0)
      }), {cal:0,protein:0,carbs:0,fat:0});
      const remain = { cal: tgt.cal - tot.cal };

      const updateTodayLog = (meal, updater) => {
        setLogs(prev => {
          const day = prev[todayKey] || { breakfast:[], lunch:[], dinner:[], snacks:[] };
          return { ...prev, [todayKey]: { ...day, [meal]: updater(day[meal] || []) } };
        });
      };
      const addFood = () => {
        if (!newFood.name.trim()) return;
        updateTodayLog(newFood.meal, foods => [...foods, { ...newFood, id: Date.now() }]);
        setNewFood(p => ({ ...p, name:"", cal:"", protein:"", carbs:"", fat:"" }));
        setModal(false);
      };
      const addRecipe = (name, macros) => {
        updateTodayLog(newFood.meal, foods => [...foods, { ...macros, name, id: Date.now() }]);
        setModal(false);
      };
      const del = (meal, id) => updateTodayLog(meal, foods => foods.filter(f => f.id !== id));
      const toggleG = (id) => setGrocery(p => p.map(g => g.id === id ? {...g, checked: !g.checked} : g));
      const resetG = () => setGrocery(p => p.map(g => ({...g, checked: false})));
      const deletePantry = (id) => setPantry(p => p.filter(i => i.id !== id));

      if (loading && !authed) return (
        <div style={{ minHeight:"100vh", background:S.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ color:S.dim, fontFamily:"'DM Mono',monospace", letterSpacing:2, fontSize:12 }}>LOADING SYSTEMS...</div>
        </div>
      );
      if (!authed) return <SignIn onSignIn={signIn} error={authError} />;
      if (loading) return (
        <div style={{ minHeight:"100vh", background:S.bg, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
          <div className="spin" style={{ width:48, height:48, border:`3px solid ${S.border}`, borderTopColor:S.accent, borderRadius:"50%" }} />
          <div style={{ color:S.dim, fontFamily:"'DM Mono',monospace", letterSpacing:2, fontSize:11 }}>SYNCING WITH DRIVE...</div>
        </div>
      );

      const Card = ({children, style={}}) => (
        <div style={{ background:S.card, border:`1px solid ${S.border}`, borderRadius:16, overflow:"hidden", ...style }}>{children}</div>
      );
      const CardHead = ({children}) => (
        <div style={{ padding:"12px 16px", borderBottom:`1px solid ${S.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>{children}</div>
      );
      const macroBar = (v, m, c) => {
        const pct = Math.min(v/m*100,100), over = v>m;
        return (
          <div style={{ height:4, background:"rgba(255,255,255,0.06)", borderRadius:2, overflow:"hidden", marginTop:4 }}>
            <div style={{ width:`${pct}%`, height:"100%", background:over?S.red:c, borderRadius:2, transition:"width 0.4s", boxShadow:`0 0 6px ${over?S.red:c}88` }} />
          </div>
        );
      };

      const byStore = grocery.reduce((a,i) => { (a[i.store]??=[]).push(i); return a; }, {});
      const byCat = pantry.reduce((a,i) => { (a[i.cat]??=[]).push(i); return a; }, {});
      const urgent = pantry.filter(i => i.status==="urgent");

      return (
        <div style={{ minHeight:"100vh", background:S.bg, color:S.text, paddingBottom:90, maxWidth:480, margin:"0 auto", position:"relative" }}>

          <div style={{ background:S.card, borderBottom:`1px solid ${S.border}`, padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:40, backdropFilter:"blur(12px)" }}>
            <div>
              <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim }}>
                {DOW[now.getDay()]} · {MONTH[now.getMonth()]} {now.getDate()}
              </div>
              <div style={{ fontSize:20, fontWeight:700, letterSpacing:"-0.5px", marginTop:2 }}>CONCIERGE</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1.5, fontWeight:700, padding:"4px 12px", borderRadius:20, background:hc?`${S.hc}22`:`${S.lc}22`, color:hc?S.hc:S.lc, border:`1px solid ${hc?S.hc:S.lc}44` }}>
                  {hc?"HIGH CARB":"LOW CARB"}
                </div>
                <div style={{ fontSize:10, color: syncing ? S.accent : S.dim, fontFamily:"'DM Mono',monospace" }}>
                  {syncing ? "SYNCING..." : "● SYNCED"}
                </div>
              </div>
              <button onClick={() => setShowSettings(true)} style={{ background:"rgba(255,255,255,0.05)", border:`1px solid ${S.border}`, borderRadius:8, padding:"8px 10px", color:S.dim, cursor:"pointer", fontSize:14 }}>⋯</button>
            </div>
          </div>

          <div style={{ padding:"16px 16px 0" }}>

            {tab==="today" && <>
              <Card style={{ marginBottom:12 }}>
                <CardHead>
                  <span style={{ fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim }}>MACROS TODAY</span>
                  <span style={{ fontSize:11, color:remain.cal<0?S.red:S.green, fontFamily:"'DM Mono',monospace", fontWeight:700 }}>
                    {remain.cal<0?"+":""}{Math.abs(Math.round(remain.cal))} KCAL {remain.cal>=0?"LEFT":"OVER"}
                  </span>
                </CardHead>
                <div style={{ padding:16 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-around", marginBottom:16 }}>
                    <Arc val={tot.cal} max={tgt.cal} color={S.cal} size={88} thick={7}>
                      <div style={{ fontSize:16, fontWeight:800, color:S.text }}>{Math.round(tot.cal)}</div>
                      <div style={{ fontSize:10, color:S.dim, fontFamily:"'DM Mono',monospace" }}>KCAL</div>
                    </Arc>
                    <div style={{ display:"flex", gap:12 }}>
                      {[{k:"protein",label:"PRO",color:S.prot},{k:"carbs",label:"CHO",color:S.carb},{k:"fat",label:"FAT",color:S.fat}].map(({k,label,color}) => (
                        <Arc key={k} val={tot[k]} max={tgt[k]} color={color} size={64} thick={5}>
                          <div style={{ fontSize:13, fontWeight:700, color:S.text }}>{Math.round(tot[k])}</div>
                          <div style={{ fontSize:9, color:S.dim, fontFamily:"'DM Mono',monospace" }}>{label}</div>
                        </Arc>
                      ))}
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {[{label:"PROTEIN",val:tot.protein,max:tgt.protein,unit:"g",color:S.prot},
                      {label:"CARBS",val:tot.carbs,max:tgt.carbs,unit:"g",color:S.carb},
                      {label:"FAT",val:tot.fat,max:tgt.fat,unit:"g",color:S.fat},
                      {label:"CALORIES",val:tot.cal,max:tgt.cal,unit:"",color:S.cal}].map(({label,val,max,unit,color}) => (
                      <div key={label} style={{ background:"rgba(255,255,255,0.03)", borderRadius:10, padding:"10px 12px" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                          <span style={{ fontSize:9, fontFamily:"'DM Mono',monospace", letterSpacing:1.5, color:S.dim }}>{label}</span>
                          <span style={{ fontSize:13, fontWeight:700, color }}>
                            {Math.round(val)}<span style={{ fontSize:9, color:S.dim }}>{unit}</span>
                            <span style={{ fontSize:9, color:S.dim }}>/{max}{unit}</span>
                          </span>
                        </div>
                        {macroBar(val,max,color)}
                      </div>
                    ))}
                  </div>
                </div>
              </Card>

              {[{key:"breakfast",label:"BREAKFAST",emoji:"☀️"},{key:"lunch",label:"LUNCH",emoji:"🥩"},
                {key:"dinner",label:"DINNER",emoji:"🌙"},{key:"snacks",label:"SNACKS",emoji:"⚡"}].map(({key,label,emoji}) => {
                const foods = todayLog[key] || [];
                const mTot = foods.reduce((a,f) => ({cal:a.cal+(+f.cal||0),protein:a.protein+(+f.protein||0),carbs:a.carbs+(+f.carbs||0),fat:a.fat+(+f.fat||0)}), {cal:0,protein:0,carbs:0,fat:0});
                return (
                  <Card key={key} style={{ marginBottom:10 }}>
                    <CardHead>
                      <span style={{ fontWeight:600, fontSize:13 }}>{emoji} {label}</span>
                      <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim }}>
                        {Math.round(mTot.protein)}P · {Math.round(mTot.carbs)}C · {Math.round(mTot.fat)}F
                      </span>
                    </CardHead>
                    {foods.map(f => (
                      <div key={f.id} style={{ padding:"10px 16px", borderBottom:`1px solid ${S.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:13, fontWeight:500 }}>{f.name}</div>
                          <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim, marginTop:2 }}>
                            {Math.round(f.cal)} kcal · {Math.round(f.protein)}P · {Math.round(f.carbs)}C · {Math.round(f.fat)}F
                          </div>
                        </div>
                        <button onClick={() => del(key, f.id)} style={{ background:"none", border:"none", color:S.dim, cursor:"pointer", fontSize:18, padding:"4px 8px", lineHeight:1 }}>×</button>
                      </div>
                    ))}
                    <button onClick={() => { setNewFood(p => ({...p, meal:key})); setModal(true); }}
                      style={{ width:"100%", padding:"10px 16px", background:"transparent", border:"none", cursor:"pointer", color:S.dim, fontSize:11, textAlign:"center", fontFamily:"'DM Mono',monospace", letterSpacing:1 }}>
                      + ADD FOOD
                    </button>
                  </Card>
                );
              })}
            </>}

            {tab==="grocery" && <>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1.5, color:S.dim }}>
                  {grocery.filter(g=>g.checked).length}/{grocery.length} CHECKED
                </div>
                <button onClick={resetG} style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1, color:S.accent, background:"none", border:"none", cursor:"pointer" }}>RESET</button>
              </div>
              {Object.entries(byStore).map(([store, items]) => (
                <Card key={store} style={{ marginBottom:10 }}>
                  <CardHead>
                    <span style={{ fontWeight:600, fontSize:13 }}>🏪 {store}</span>
                    <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim }}>{items.filter(i=>i.checked).length}/{items.length}</span>
                  </CardHead>
                  {items.map(item => (
                    <div key={item.id} onClick={() => toggleG(item.id)}
                      style={{ padding:"12px 16px", borderBottom:`1px solid ${S.border}`, display:"flex", alignItems:"center", gap:12, cursor:"pointer", opacity:item.checked?0.4:1, transition:"opacity .2s" }}>
                      <div style={{ width:20, height:20, borderRadius:4, flexShrink:0, border:item.checked?`2px solid ${S.accent}`:`2px solid ${S.border}`, background:item.checked?S.accent:"transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s" }}>
                        {item.checked && <span style={{ fontSize:11, color:"#000", fontWeight:900 }}>✓</span>}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:500, textDecoration:item.checked?"line-through":"none" }}>{item.item}</div>
                        <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim, marginTop:2 }}>
                          {item.sec}{item.est?` · ${item.est}`:""}{item.deal?` · 🏷️ ${item.deal}`:""}
                        </div>
                      </div>
                    </div>
                  ))}
                </Card>
              ))}
            </>}

            {tab==="pantry" && <>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                <button onClick={() => startScan('single')}
                  style={{ padding:"12px 8px", borderRadius:12, background:`${S.accent}15`, border:`1px solid ${S.accent}44`, color:S.accent, fontSize:12, fontFamily:"'DM Mono',monospace", fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
                  📷 ADD ITEM
                </button>
                <button onClick={() => startScan('bulk')}
                  style={{ padding:"12px 8px", borderRadius:12, background:`${S.accent}15`, border:`1px solid ${S.accent}44`, color:S.accent, fontSize:12, fontFamily:"'DM Mono',monospace", fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
                  📦 BULK SCAN
                </button>
              </div>

              {urgent.length>0 && (
                <div style={{ background:`${S.orange}15`, border:`1px solid ${S.orange}44`, borderRadius:12, padding:"10px 14px", marginBottom:12 }}>
                  <div style={{ fontFamily:"'DM Mono',monospace", letterSpacing:1, color:S.orange, marginBottom:4, fontWeight:700, fontSize:11 }}>⚠ USE FIRST</div>
                  {urgent.map(i => (<div key={i.id} style={{ color:S.orange, fontSize:12 }}>· {i.item} ({i.qty})</div>))}
                </div>
              )}
              {Object.entries(byCat).map(([cat, items]) => (
                <Card key={cat} style={{ marginBottom:10 }}>
                  <CardHead>
                    <span style={{ fontWeight:600, fontSize:12, fontFamily:"'DM Mono',monospace", letterSpacing:1.5 }}>{cat}</span>
                    <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim }}>{items.length}</span>
                  </CardHead>
                  {items.map(item => {
                    const sc = {good:S.green,low:S.yellow,urgent:S.orange,empty:S.red}[item.status] ?? S.dim;
                    const dot = {good:"●",low:"●",urgent:"▲",empty:"✕"}[item.status] ?? "●";
                    return (
                      <div key={item.id} style={{ padding:"10px 16px", borderBottom:`1px solid ${S.border}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:13, fontWeight:500 }}>{item.item}</div>
                          <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim, marginTop:2 }}>{item.qty}</div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                          <span style={{ color:sc, fontSize:12 }}>{dot}</span>
                          <button onClick={() => deletePantry(item.id)} style={{ background:"none", border:"none", color:S.dim, cursor:"pointer", fontSize:16, padding:"4px 6px", lineHeight:1 }}>×</button>
                        </div>
                      </div>
                    );
                  })}
                </Card>
              ))}
            </>}

            {tab==="deals" && <>
              <Card style={{ marginBottom:12 }}>
                <CardHead><span style={{ fontWeight:600, fontSize:13 }}>📅 FLYER CADENCE</span></CardHead>
                {DEALS_SEED.map(d => (
                  <div key={d.store} style={{ padding:"11px 16px", borderBottom:`1px solid ${S.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:13, fontWeight:500 }}>{d.store}</div>
                      <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim, marginTop:2 }}>{d.note}</div>
                    </div>
                    <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1, fontWeight:700, background:`${S.accent}22`, color:S.accent, padding:"3px 8px", borderRadius:4 }}>{d.drop.toUpperCase()}</span>
                  </div>
                ))}
              </Card>
              <Card>
                <CardHead><span style={{ fontWeight:600, fontSize:13 }}>🏷️ ACTIVE DEALS</span></CardHead>
                <div style={{ padding:"20px 16px", textAlign:"center" }}>
                  <div style={{ fontSize:11, fontFamily:"'DM Mono',monospace", color:S.dim, letterSpacing:1 }}>POPULATED THURSDAY</div>
                </div>
              </Card>
            </>}
          </div>

          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:S.card, borderTop:`1px solid ${S.border}`, display:"flex", backdropFilter:"blur(12px)", zIndex:39, paddingBottom:"env(safe-area-inset-bottom)" }}>
            <div style={{ display:"flex", width:"100%", maxWidth:480, margin:"0 auto" }}>
              {[{id:"today",icon:"◉",label:"Today"},{id:"grocery",icon:"◈",label:"Grocery"},{id:"pantry",icon:"◫",label:"Pantry"},{id:"deals",icon:"◆",label:"Deals"}].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4, padding:"10px 4px", background:"transparent", border:"none", cursor:"pointer", color:tab===t.id?S.accent:S.dim, borderTop:tab===t.id?`2px solid ${S.accent}`:"2px solid transparent", transition:"all .2s" }}>
                  <span style={{ fontSize:20 }}>{t.icon}</span>
                  <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:1, fontWeight:600 }}>{t.label.toUpperCase()}</span>
                </button>
              ))}
            </div>
          </div>

          {modal && (
            <div onClick={() => setModal(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:50, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
              <div onClick={e => e.stopPropagation()} style={{ background:"#111620", borderRadius:"24px 24px 0 0", width:"100%", maxWidth:480, padding:"20px 16px", borderTop:`1px solid ${S.border}` }}>
                <div style={{ fontSize:14, fontWeight:700, marginBottom:16, letterSpacing:0.5 }}>ADD TO {newFood.meal.toUpperCase()}</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6, marginBottom:14 }}>
                  {["breakfast","lunch","dinner","snacks"].map(m => (
                    <button key={m} onClick={() => setNewFood(p => ({...p, meal:m}))}
                      style={{ padding:"7px 4px", borderRadius:8, fontSize:10, fontFamily:"'DM Mono',monospace", letterSpacing:0.5, fontWeight:600, cursor:"pointer", border:`1px solid ${newFood.meal===m?S.accent:S.border}`, background:newFood.meal===m?`${S.accent}22`:"transparent", color:newFood.meal===m?S.accent:S.dim }}>
                      {m.toUpperCase()}
                    </button>
                  ))}
                </div>
                <div style={{ marginBottom:12 }}>
                  <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim, marginBottom:6 }}>QUICK ADD</div>
                  {Object.entries(RECIPES).map(([name, macros]) => (
                    <button key={name} onClick={() => addRecipe(name, macros)}
                      style={{ width:"100%", background:`${S.accent}12`, border:`1px solid ${S.accent}33`, borderRadius:10, padding:"10px 14px", cursor:"pointer", marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:12, color:S.text, textAlign:"left" }}>{name}</span>
                      <span style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim }}>{macros.cal}cal</span>
                    </button>
                  ))}
                </div>
                <div style={{ fontSize:9, fontFamily:"'DM Mono',monospace", letterSpacing:2, color:S.dim, marginBottom:8 }}>MANUAL ENTRY</div>
                <input style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:`1px solid ${S.border}`, borderRadius:10, padding:"12px 14px", color:S.text, fontSize:13, outline:"none", marginBottom:8 }}
                  placeholder="Food name" value={newFood.name} onChange={e => setNewFood(p => ({...p, name:e.target.value}))} />
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                  {[["cal","Calories"],["protein","Protein (g)"],["carbs","Carbs (g)"],["fat","Fat (g)"]].map(([k,ph]) => (
                    <input key={k} type="number" inputMode="decimal" style={{ background:"rgba(255,255,255,0.05)", border:`1px solid ${S.border}`, borderRadius:10, padding:"10px 12px", color:S.text, fontSize:13, outline:"none", width:"100%" }}
                      placeholder={ph} value={newFood[k]} onChange={e => setNewFood(p => ({...p, [k]:e.target.value}))} />
                  ))}
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={addFood} style={{ flex:2, padding:"13px", borderRadius:12, background:S.accent, color:"#0a0c0f", fontWeight:800, fontSize:13, border:"none", cursor:"pointer", letterSpacing:0.5 }}>ADD ENTRY</button>
                  <button onClick={() => setModal(false)} style={{ flex:1, padding:"13px", borderRadius:12, background:"rgba(255,255,255,0.06)", color:S.dim, fontSize:13, border:"none", cursor:"pointer" }}>CANCEL</button>
                </div>
              </div>
            </div>
          )}

          {/* CAMERA */}
          {camera && <Camera onCapture={handleCapture} onClose={() => setCamera(false)} mode={scanMode} />}

          {/* SCANNING */}
          {scanning && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", zIndex:102, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:20 }}>
              <div className="spin" style={{ width:64, height:64, border:`4px solid ${S.border}`, borderTop:`4px solid ${S.accent}`, borderRadius:"50%" }} />
              <div style={{ color:S.text, fontSize:14, fontFamily:"'DM Mono',monospace", letterSpacing:2 }}>ANALYZING...</div>
              <div style={{ color:S.dim, fontSize:11, maxWidth:280, textAlign:"center", lineHeight:1.6 }}>
                {scanMode === 'single' ? 'Reading label, identifying item' : 'Detecting items, categorizing, counting'}
              </div>
            </div>
          )}

          {/* SCAN ERROR */}
          {scanError && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:102, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
              <div style={{ background:S.card, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:480, padding:"24px 16px" }}>
                <div style={{ fontSize:16, fontWeight:700, color:S.red, marginBottom:8 }}>⚠ Scan Failed</div>
                <div style={{ fontSize:13, color:S.dim, marginBottom:20, lineHeight:1.5, fontFamily:"'DM Mono',monospace" }}>{scanError}</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => { setScanError(null); setCamera(true); }} style={{ flex:1, padding:"13px", borderRadius:12, background:S.accent, color:"#0a0c0f", fontWeight:800, fontSize:13, border:"none", cursor:"pointer" }}>TRY AGAIN</button>
                  <button onClick={() => setScanError(null)} style={{ flex:1, padding:"13px", borderRadius:12, background:"rgba(255,255,255,0.06)", color:S.dim, fontSize:13, border:"none", cursor:"pointer" }}>CANCEL</button>
                </div>
              </div>
            </div>
          )}

          {/* RESULTS */}
          {singleResult && <SingleResult result={singleResult} onConfirm={addPantryItem} onCancel={() => setSingleResult(null)} />}
          {bulkResult && <BulkResult result={bulkResult} onConfirm={addBulkItems} onCancel={() => setBulkResult(null)} />}

          {/* SETTINGS */}
          {showSettings && (
            <div onClick={() => { setShowSettings(false); setShowKeyInput(false); }} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:50, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
              <div onClick={e => e.stopPropagation()} style={{ background:S.card, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:480, padding:"20px 16px", maxHeight:"90vh", overflowY:"auto" }}>
                <div style={{ fontSize:14, fontWeight:700, marginBottom:16, letterSpacing:0.5 }}>SETTINGS</div>

                <div style={{ background:`${S.green}10`, border:`1px solid ${S.green}33`, borderRadius:10, padding:"12px 14px", marginBottom:12 }}>
                  <div style={{ fontSize:11, fontFamily:"'DM Mono',monospace", color:S.green, letterSpacing:1, fontWeight:700, marginBottom:4 }}>● DRIVE SYNCED</div>
                  <div style={{ fontSize:11, color:S.dim, lineHeight:1.5 }}>
                    Data syncs to Drive automatically.<br/>
                    {lastSync && <>Last sync: {lastSync.toLocaleTimeString()}</>}
                  </div>
                </div>

                {/* API KEY SECTION */}
                <div style={{ background:apiKey ? `${S.accent}10` : `${S.orange}10`, border:`1px solid ${apiKey ? S.accent : S.orange}33`, borderRadius:10, padding:"14px", marginBottom:12 }}>
                  <div style={{ fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:1, color: apiKey ? S.accent : S.orange, fontWeight:700, marginBottom:6 }}>
                    {apiKey ? "● AI SCAN READY" : "○ AI SCAN NEEDS KEY"}
                  </div>
                  <div style={{ fontSize:11, color:S.dim, lineHeight:1.5, marginBottom:10 }}>
                    Pantry AI scan requires an Anthropic API key.<br/>
                    Get one at <span style={{ color:S.accent, fontFamily:"'DM Mono',monospace" }}>console.anthropic.com</span><br/>
                    Cost: ~$0.01 per scan, billed by Anthropic.
                  </div>

                  {apiKey && !showKeyInput && (
                    <div style={{ display:"flex", gap:6 }}>
                      <div style={{ flex:1, fontSize:11, fontFamily:"'DM Mono',monospace", color:S.dim, padding:"8px 10px", background:"rgba(255,255,255,0.04)", borderRadius:8, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {keyVisible ? apiKey : `sk-ant-...${apiKey.slice(-6)}`}
                      </div>
                      <button onClick={() => setKeyVisible(!keyVisible)} style={{ padding:"8px 10px", background:"rgba(255,255,255,0.06)", border:"none", borderRadius:8, color:S.dim, fontSize:11, cursor:"pointer" }}>
                        {keyVisible ? "HIDE" : "SHOW"}
                      </button>
                      <button onClick={clearApiKey} style={{ padding:"8px 10px", background:`${S.red}22`, border:"none", borderRadius:8, color:S.red, fontSize:11, cursor:"pointer" }}>
                        CLEAR
                      </button>
                    </div>
                  )}

                  {(!apiKey || showKeyInput) && (
                    <>
                      <input value={tempKey} onChange={e => setTempKey(e.target.value)}
                        type={keyVisible ? "text" : "password"}
                        placeholder="sk-ant-..."
                        style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:`1px solid ${S.border}`, borderRadius:8, padding:"10px 12px", color:S.text, fontSize:12, fontFamily:"'DM Mono',monospace", outline:"none", marginBottom:8 }} />
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => setKeyVisible(!keyVisible)} style={{ flex:0, padding:"8px 12px", background:"rgba(255,255,255,0.06)", border:"none", borderRadius:8, color:S.dim, fontSize:11, cursor:"pointer" }}>
                          {keyVisible ? "HIDE" : "SHOW"}
                        </button>
                        <button onClick={saveApiKey} disabled={!tempKey.trim()} style={{ flex:1, padding:"10px", background: tempKey.trim() ? S.accent : "rgba(255,255,255,0.06)", color: tempKey.trim() ? "#0a0c0f" : S.dim, fontWeight:700, fontSize:12, border:"none", borderRadius:8, cursor: tempKey.trim() ? "pointer" : "not-allowed", letterSpacing:0.5 }}>
                          SAVE KEY
                        </button>
                        {showKeyInput && (
                          <button onClick={() => { setShowKeyInput(false); setTempKey(''); }} style={{ padding:"10px 12px", background:"rgba(255,255,255,0.06)", border:"none", borderRadius:8, color:S.dim, fontSize:11, cursor:"pointer" }}>
                            CANCEL
                          </button>
                        )}
                      </div>
                    </>
                  )}
                  <div style={{ fontSize:10, color:S.dim, marginTop:8, lineHeight:1.5 }}>
                    Stored only on this device. Never synced to Drive.
                  </div>
                </div>

                <button onClick={() => { saveData(); setShowSettings(false); }}
                  style={{ width:"100%", background:`${S.accent}12`, border:`1px solid ${S.accent}33`, borderRadius:10, padding:"14px 16px", cursor:"pointer", marginBottom:10, textAlign:"left" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:S.text }}>🔄 Force Sync Now</div>
                  <div style={{ fontSize:11, color:S.dim, marginTop:4 }}>Push current data to Drive immediately</div>
                </button>
                <button onClick={signOut}
                  style={{ width:"100%", background:"rgba(248,113,113,0.08)", border:`1px solid ${S.red}33`, borderRadius:10, padding:"14px 16px", cursor:"pointer", marginBottom:10, textAlign:"left" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:S.red }}>🚪 Sign Out</div>
                  <div style={{ fontSize:11, color:S.dim, marginTop:4 }}>Revoke access; require re-sign-in</div>
                </button>
                <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:S.dim, marginTop:14, textAlign:"center" }}>
                  v4.0 · PANTRY AI SCAN ENABLED
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
