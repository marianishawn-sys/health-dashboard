          const prompt = "Identify the food(s) visible in this image. For each distinct food, provide: name (specific, e.g. 'Grilled chicken thigh' not 'Chicken'), estimated weight in grams visible in the photo, and macros per 100g (calories, protein, carbs, fat, fibre). If a nutrition label is visible, use those exact values and back-calculate per 100g. If a barcode is visible, identify the product if possible. Return ONLY valid JSON in this exact shape, no other text or markdown: {\"foods\":[{\"name\":\"string\",\"brand\":\"string or empty\",\"estimatedGrams\":number,\"per100g\":{\"cal\":number,\"protein\":number,\"carbs\":number,\"fat\":number,\"fibre\":number},\"confidence\":\"HIGH|MEDIUM|LOW\"}]}";
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: CLAUDE_MODEL,
              max_tokens: 1500,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: mimeType, data: base64 } },
                  { type: "text", text: prompt },
                ],
              }],
            }),
          });
          if (!res.ok) {
            const errText = await res.text();
            throw new Error("API error " + res.status + ": " + errText.slice(0,200));
          }
          const data = await res.json();
          const text = data.content[0].text;
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error("No JSON in response");
          const parsed = JSON.parse(jsonMatch[0]);
          const foods = (parsed.foods || []).map(f => ({
            ...f,
            per100g: { fibre: 0, ...f.per100g },
            id: uid("scan"),
            selected: true,
          }));
          setResults(foods);
          setPhase("review");
        } catch (err) {
          console.error("Scan failed", err);
          setError(err.message || "Scan failed");
          setPhase("error");
        }
      };

      const toggleResult = (id) => {
        setResults(results.map(r => r.id === id ? { ...r, selected: !r.selected } : r));
      };

      const updateResult = (id, field, value) => {
        setResults(results.map(r => {
          if (r.id !== id) return r;
          if (field === "estimatedGrams") return { ...r, estimatedGrams: parseInt(value) || 0 };
          if (field.startsWith("per100g.")) {
            const k = field.split(".")[1];
            return { ...r, per100g: { ...r.per100g, [k]: parseFloat(value) || 0 } };
          }
          return { ...r, [field]: value };
        }));
      };

      const refreshMacros = async (id, name) => {
        if (!name.trim()) return;
        setRefreshingId(id);
        try {
          const url = "https://world.openfoodfacts.org/cgi/search.pl?search_terms=" +
            encodeURIComponent(name.trim()) + "&search_simple=1&action=process&json=1&page_size=3&fields=product_name,brands,nutriments";
          const res = await fetch(url);
          const json = await res.json();
          const products = (json.products || []).filter(p => p.nutriments && p.nutriments["energy-kcal_100g"] != null);
          if (products.length > 0) {
            const p = products[0];
            setResults(prev => prev.map(r => r.id !== id ? r : {
              ...r,
              per100g: {
                cal: Math.round(p.nutriments["energy-kcal_100g"] || 0),
                protein: round(p.nutriments["proteins_100g"] || 0, 1),
                carbs: round(p.nutriments["carbohydrates_100g"] || 0, 1),
                fat: round(p.nutriments["fat_100g"] || 0, 1),
                fibre: round(p.nutriments["fiber_100g"] || p.nutriments["fiber-dietary_100g"] || 0, 1),
              },
            }));
          }
        } catch(e) {}
        setRefreshingId(null);
      };

      const confirmAll = () => {
        const selected = results.filter(r => r.selected);
        if (selected.length === 0) return;
        const toFood = r => ({
          id: uid("f"),
          name: r.name,
          brand: r.brand || "",
          refPortion: { grams: r.estimatedGrams, label: r.estimatedGrams + "g (scanned)" },
          per100g: r.per100g,
          category: "scan",
          tags: [],
          source: "ai_scan",
        });
        if (selected.length === 1) {
          onResult(toFood(selected[0]));
        } else {
          onLogAll(selected.map(r => ({ ...toFood(r), _scannedGrams: r.estimatedGrams })));
        }
      };

      if (phase === "capture") {
        return (
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
              <button onClick={onCancel} style={{ background:"none", border:"none", color:S.dim, fontSize:13, cursor:"pointer", letterSpacing:1 }}>← BACK</button>
              <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>SCAN MEAL</div>
              <div style={{ width:50 }} />
            </div>
            <div style={{ padding:"30px 16px", textAlign:"center" }}>
              <div style={{ fontSize:48, marginBottom:14 }}>📷</div>
              <div style={{ fontSize:13, color:S.text, marginBottom:6 }}>Point at your plate, a nutrition label, or a barcode</div>
              <div style={{ fontSize:11, color:S.dim, marginBottom:24, lineHeight:1.5 }}>
                AI identifies food and macros. About 1¢ per scan.
              </div>
              <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display:"none" }} />
              <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }} />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <button onClick={() => cameraRef.current && cameraRef.current.click()} style={{ background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"16px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                  📷 CAMERA
                </button>
                <button onClick={() => fileRef.current && fileRef.current.click()} style={{ background:S.panel, color:S.text, border:"1px solid "+S.border, borderRadius:12, padding:"16px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                  🖼️ UPLOAD
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (phase === "analyzing") {
        return (
          <div style={{ padding:"40px 20px", textAlign:"center" }}>
            <div className="spin" style={{ width:36, height:36, border:"3px solid "+S.dim, borderTopColor:S.accent, borderRadius:"50%", margin:"0 auto 14px" }} />
            <div style={{ fontSize:12, color:S.dim, letterSpacing:1, marginBottom:6 }}>ANALYZING IMAGE</div>
            <div style={{ fontSize:10, color:S.dimmer }}>Usually 3–6 seconds</div>
          </div>
        );
      }

      if (phase === "error") {
        return (
          <div style={{ padding:"24px 16px" }}>
            <div style={{ fontSize:13, color:S.red, marginBottom:10 }}>Scan failed</div>
            <div style={{ fontSize:11, color:S.dim, marginBottom:20, wordBreak:"break-word" }}>{error}</div>
            <button onClick={() => { setError(""); setPhase("capture"); }} style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, color:S.text, padding:"12px", borderRadius:10, fontSize:12, fontWeight:600, cursor:"pointer" }}>
              TRY AGAIN
            </button>
          </div>
        );
      }

      // review phase
      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <button onClick={() => setPhase("capture")} style={{ background:"none", border:"none", color:S.dim, fontSize:13, cursor:"pointer", letterSpacing:1 }}>← RETAKE</button>
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>SCAN RESULT</div>
            <div style={{ width:60 }} />
          </div>
          <div style={{ overflowY:"auto", maxHeight:"calc(90vh - 200px)", paddingRight:2 }}>
            {results.map(r => (
              <div key={r.id} style={{ background: r.selected ? S.panel : S.panel2, border:`1px solid ${r.selected ? S.borderHi : S.border}`, borderRadius:10, padding:12, marginBottom:8, opacity: r.selected ? 1 : 0.55 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                  <button onClick={() => toggleResult(r.id)} style={{ flexShrink:0, width:22, height:22, borderRadius:6, background: r.selected ? S.accent : "transparent", border:`2px solid ${r.selected ? S.accent : S.dim}`, color:"#0a0c0f", fontSize:12, fontWeight:700, cursor:"pointer", padding:0 }}>
                    {r.selected ? "✓" : ""}
                  </button>
                  <input type="text" value={r.name} onChange={e => updateResult(r.id, "name", e.target.value)} style={{ flex:1, background:"transparent", border:"none", color:S.text, fontSize:14, fontWeight:500, outline:"none", padding:0, minWidth:0 }} />
                  <button onClick={() => refreshMacros(r.id, r.name)} disabled={refreshingId === r.id} title="Re-fetch macros from Open Food Facts" style={{ flexShrink:0, background:"none", border:"none", color: refreshingId === r.id ? S.dim : S.accent, fontSize:13, cursor:"pointer", padding:"0 2px" }}>
                    {refreshingId === r.id ? "…" : "🔍"}
                  </button>
                  <span style={{ flexShrink:0, fontSize:9, letterSpacing:1, color: r.confidence === "HIGH" ? S.green : r.confidence === "MEDIUM" ? S.accent : S.red }}>{r.confidence}</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:4, marginBottom:6 }}>
                  <ScanField label="g" value={r.estimatedGrams} onChange={v => updateResult(r.id, "estimatedGrams", v)} />
                  <ScanField label="kcal/100g" value={r.per100g.cal} onChange={v => updateResult(r.id, "per100g.cal", v)} />
                  <ScanField label="PRO/100g" value={r.per100g.protein} onChange={v => updateResult(r.id, "per100g.protein", v)} />
                  <ScanField label="CRB/100g" value={r.per100g.carbs} onChange={v => updateResult(r.id, "per100g.carbs", v)} />
                  <ScanField label="FAT/100g" value={r.per100g.fat} onChange={v => updateResult(r.id, "per100g.fat", v)} />
                  <ScanField label="FIB/100g" value={r.per100g.fibre ?? 0} onChange={v => updateResult(r.id, "per100g.fibre", v)} />
                </div>
              </div>
            ))}
          </div>
          {(() => {
            const selectedCount = results.filter(r => r.selected).length;
            const multi = selectedCount > 1;
            return (
              <div style={{ borderTop:"1px solid "+S.border, paddingTop:10, marginTop:6 }}>
                <button onClick={confirmAll} disabled={selectedCount === 0} style={{ width:"100%", background: selectedCount > 0 ? S.accent : S.panel2, color: selectedCount > 0 ? "#0a0c0f" : S.dim, border:"none", borderRadius:12, padding:"14px", fontSize:12, fontWeight:700, letterSpacing:1.5, cursor: selectedCount > 0 ? "pointer" : "not-allowed" }}>
                  {multi ? `LOG ${selectedCount} ITEMS AT SCANNED GRAMS` : "USE → ADJUST PORTION"}
                </button>
                {multi && <div style={{ fontSize:10, color:S.dim, textAlign:"center", marginTop:8, lineHeight:1.5 }}>All selected items logged directly — edit portions from the tracker.</div>}
              </div>
            );
          })()}
        </div>
      );
    }

    function ScanField({ label, value, onChange }) {
      return (
        <div>
          <input type="number" inputMode="decimal" value={value} onChange={e => onChange(e.target.value)}
            style={{ width:"100%", background:S.panel2, border:"1px solid "+S.border, borderRadius:6, padding:"7px 4px", color:S.text, fontSize:12, fontWeight:600, textAlign:"center", outline:"none", fontFamily:"'DM Mono',monospace" }} />
          <div style={{ fontSize:8, color:S.dim, letterSpacing:1, textAlign:"center", marginTop:2 }}>{label}</div>
        </div>
      );
    }

    // ───────────────────── MFP RECIPE CSV HELPERS ─────────────────────
    // Parse one CSV line, respecting quoted fields (e.g. "chopped, Onions, raw")
    const parseCSVLine = (line) => {
      const out = []; let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { out.push(cur.trim()); cur = ""; }
        else cur += c;
      }
      out.push(cur.trim());
      return out;
    };

    // Normalise a MFP quantity string ("2 tbsp(s)", "454 gram", "1 large", "0.50 cup") → {qty, unit}
    const parseQuantityStr = (str) => {
      if (!str) return { qty: 1, unit: "portions" };
      str = str.trim();
      const m = str.match(/^([\d.]+)\s*(.*)/);
      if (!m) return { qty: 1, unit: "portions" };
      const qty = parseFloat(m[1]) || 1;
      let u = (m[2] || "").toLowerCase()
        .replace(/\(s\)$/,"").replace(/s\b/,"").replace(/\.$/, "").trim();
      const MAP = {
        gram:"g",grams:"g","gram":"g",
        tablespoon:"tbsp",tbsp:"tbsp",
        teaspoon:"tsp",tsp:"tsp",
        cup:"cup",
        ml:"ml",mL:"ml",
        oz:"oz",ounce:"oz",
        lb:"lb",pound:"lb",
        large:"portions",medium:"portions",small:"portions",
        egg:"portions",clove:"portions",avocado:"portions",
        pepper:"portions",onion:"portions","":"portions",
      };
      return { qty, unit: MAP[u] || u || "portions" };
    };

    // Fetch one product from Open Food Facts; returns {brand, per100g} or null
    const fetchOFFSingle = async (name) => {
      try {
        const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(name)}&search_simple=1&action=process&json=1&page_size=1&fields=product_name,brands,nutriments`;
        const r = await fetch(url);
        if (!r.ok) return null;
        const d = await r.json();
        const p = d.products?.[0];
        if (!p) return null;
        const n = p.nutriments || {};
        const cal = Math.round(n["energy-kcal_100g"] || (n["energy_100g"] || 0) / 4.184);
        return {
          brand: p.brands || "",
          per100g: {
            cal,
            protein: round(n.proteins_100g || 0, 1),
            carbs:   round(n.carbohydrates_100g || 0, 1),
            fat:     round(n.fat_100g || 0, 1),
            fibre:   round(n.fiber_100g || 0, 1),
          },
        };
      } catch { return null; }
    };

    // ───────────────────── RECIPE EDITOR MODAL ─────────────────────
    function RecipeEditor({ recipe, ingredients, onSave, onCancel }) {
      const [name, setName]             = useState(recipe.name || "");
      const [servings, setServings]     = useState(recipe.servings || 2);
      const [rows, setRows]             = useState(recipe.ingredients || []);
      const [instructions, setInstructions] = useState(recipe.instructions || "");
      const [ingSearch, setIngSearch]   = useState("");

      const ingResults = useMemo(() => {
        if (!ingSearch.trim()) return [];
        const q = ingSearch.toLowerCase();
        const usedIds = new Set(rows.map(r => r.itemId));
        return ingredients.filter(i => !usedIds.has(i.id) && i.name.toLowerCase().includes(q)).slice(0, 6);
      }, [ingSearch, ingredients, rows]);

      const addIngredient = (ing) => {
        setRows(prev => [...prev, { itemId: ing.id, quantity: 100, unit: ing.defaultUnit || "g" }]);
        setIngSearch("");
      };
      const updateRow = (idx, field, val) =>
        setRows(prev => prev.map((r, i) => i === idx ? { ...r, [field]: val } : r));
      const removeRow = (idx) => setRows(prev => prev.filter((_, i) => i !== idx));

      const save = () => {
        if (!name.trim() || rows.length === 0) return;
        onSave({ ...recipe, name: name.trim(), servings: Math.max(1, Number(servings) || 2), ingredients: rows, instructions });
      };

      const panelStyle = { background:S.panel, border:"1px solid "+S.border, borderRadius:10 };
      const inputStyle = { ...panelStyle, padding:"10px 12px", color:S.text, fontSize:13, outline:"none", width:"100%", boxSizing:"border-box" };
      const btnSmall   = { background:"none", border:"1px solid "+S.dim, color:S.dim, borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.72)", zIndex:200, overflowY:"auto", padding:"20px 16px 40px" }}>
          <div style={{ background:S.bg, border:"1px solid "+S.border, borderRadius:16, padding:"20px 18px", maxWidth:480, margin:"0 auto" }}>

            <div style={{ fontWeight:700, fontSize:15, color:S.text, marginBottom:16 }}>
              {recipe.id ? "Edit Recipe" : "New Recipe"}
            </div>

            {/* Name + Servings */}
            <input placeholder="Recipe name *" value={name} onChange={e => setName(e.target.value)}
              style={{ ...inputStyle, marginBottom:10, fontSize:14 }} />
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
              <span style={{ fontSize:12, color:S.dim }}>Servings</span>
              <input type="number" min="1" value={servings} onChange={e => setServings(e.target.value)}
                style={{ ...inputStyle, width:70, textAlign:"center" }} />
            </div>

            {/* Ingredient rows */}
            {rows.length > 0 && (
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:9, letterSpacing:2, color:S.dim, marginBottom:6 }}>INGREDIENTS</div>
                {rows.map((row, idx) => {
                  const ing = ingredients.find(i => i.id === row.itemId);
                  return (
                    <div key={idx} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                      <span style={{ flex:1, fontSize:13, color:S.text }}>{ing?.name || row.itemId}</span>
                      <input type="number" min="0" value={row.quantity}
                        onChange={e => updateRow(idx, "quantity", parseFloat(e.target.value) || 0)}
                        style={{ width:64, background:S.panel, border:"1px solid "+S.border, borderRadius:8,
                          padding:"6px 8px", color:S.text, fontSize:13, outline:"none", textAlign:"right" }} />
                      <input type="text" value={row.unit}
                        onChange={e => updateRow(idx, "unit", e.target.value)}
                        style={{ width:44, background:S.panel, border:"1px solid "+S.border, borderRadius:8,
                          padding:"6px 6px", color:S.text, fontSize:12, outline:"none" }} />
                      <button onClick={() => removeRow(idx)}
                        style={{ background:"none", border:"none", color:S.dimmer, fontSize:18, cursor:"pointer", padding:"0 2px" }}>×</button>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Ingredient search */}
            <div style={{ position:"relative", marginBottom:10 }}>
              <input placeholder="Add ingredient…" value={ingSearch}
                onChange={e => setIngSearch(e.target.value)}
                style={{ ...inputStyle }} />
              {ingResults.length > 0 && (
                <div style={{ position:"absolute", left:0, right:0, top:"100%", background:S.bg,
                  border:"1px solid "+S.border, borderRadius:10, zIndex:10, maxHeight:180, overflowY:"auto" }}>
                  {ingResults.map(ing => (
                    <button key={ing.id} onClick={() => addIngredient(ing)}
                      style={{ width:"100%", textAlign:"left", background:"none", border:"none",
                        color:S.text, padding:"10px 14px", fontSize:13, cursor:"pointer",
                        borderBottom:"1px solid "+S.border }}>
                      {ing.name}
                      <span style={{ fontSize:11, color:S.dim, marginLeft:6 }}>{ing.defaultUnit}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Instructions */}
            <textarea placeholder="Instructions (optional)" value={instructions}
              onChange={e => setInstructions(e.target.value)} rows={3}
              style={{ ...inputStyle, resize:"vertical", marginBottom:16, fontFamily:"inherit" }} />

            {/* Actions */}
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={onCancel} style={{ ...btnSmall, flex:1, padding:"12px" }}>CANCEL</button>
              <button onClick={save} disabled={!name.trim() || rows.length === 0}
                style={{ flex:2, background: (!name.trim()||rows.length===0) ? S.border : S.accent,
                  color:"#0a0c0f", border:"none", borderRadius:10, padding:"12px",
                  fontSize:12, fontWeight:700, letterSpacing:1, cursor: (!name.trim()||rows.length===0) ? "default" : "pointer" }}>
                SAVE RECIPE
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ───────────────────── RECIPES TAB ─────────────────────
    function RecipesTab({ data, setData, apiKey, onMissingKey }) {
      const [editRecipe, setEditRecipe] = useState(null); // null | recipe object (new={}) | existing
      const [parseText, setParseText]   = useState("");
      const [parsing, setParsing]       = useState(false);
      const [search, setSearch]         = useState("");
      const [expandedId, setExpandedId] = useState(null);
      const [importMsg, setImportMsg]   = useState(""); // "" | progress string | result string
      const csvFileRef = useRef(null);

      const recipes     = data.recipes     || [];
      const ingredients = data.ingredients || [];

      // ── MFP CSV import ──
      const importCSV = async (file) => {
        if (!file) return;
        setImportMsg("Reading file…");
        const text = await file.text();
        const lines = text.trim().split(/\r?\n/);
        if (lines.length < 2) { setImportMsg("No data rows found."); return; }

        // Parse all rows (skip header)
        const rows = lines.slice(1).map(l => {
          const f = parseCSVLine(l);
          return {
            recipeName:    f[0] || "",
            servings:      parseFloat(f[1]) || 1,
            ingredientName: f[2] || "",
            quantityStr:   f[3] || "",
            cal:  parseFloat(f[4])  || 0,
            fat:  parseFloat(f[5])  || 0,
            carbs:parseFloat(f[9])  || 0,
            fibre:parseFloat(f[10]) || 0,
            protein:parseFloat(f[12])|| 0,
          };
        }).filter(r => r.recipeName && r.ingredientName);

        // Group by recipe
        const recipeMap = {};
        rows.forEach(r => {
          if (!recipeMap[r.recipeName]) {
            recipeMap[r.recipeName] = {
              name: r.recipeName,
              rawServings: r.servings,
              // MFP stores exact per-serving totals on every row — grab from first row
              perServing: { cal:r.cal, fat:r.fat, carbs:r.carbs, fibre:r.fibre, protein:r.protein },
              ingredients: [],
            };
          }
          recipeMap[r.recipeName].ingredients.push({ name:r.ingredientName, quantityStr:r.quantityStr });
        });

        // Detect "1g=1serv" recipes — normalise to per-100g servings for usability
        Object.values(recipeMap).forEach(rec => {
          const isPerGram = rec.rawServings > 200 ||
            /1g\s*=\s*1\s*serv|per gram/i.test(rec.name);
          if (isPerGram) {
            rec.servings = Math.max(1, Math.round(rec.rawServings / 100));
            rec.perServing = {
              cal:    round(rec.perServing.cal    * 100, 0),
              fat:    round(rec.perServing.fat    * 100, 1),
              carbs:  round(rec.perServing.carbs  * 100, 1),
              fibre:  round(rec.perServing.fibre  * 100, 1),
              protein:round(rec.perServing.protein* 100, 1),
            };
            rec.servingNote = "per 100g";
          } else {
            rec.servings = rec.rawServings;
          }
        });

        // Unique ingredient names
        const uniqueIngNames = [...new Set(rows.map(r => r.ingredientName))];
        const SKIP_OFF = new Set(["water","salt","sea salt","kosher salt","sugar","pepper","black pepper"]);

        // Build mutable copies of food/ingredient registries
        let newFoods = [...(data.foods || [])];
        let newIngs  = [...(data.ingredients || [])];
        const ingNameToId = {};

        // Pre-index existing entries (case-insensitive)
        const foodIdx = {};
        newFoods.forEach(f => { foodIdx[f.name.toLowerCase()] = f; });
        const ingIdx = {};
        newIngs.forEach(i => { ingIdx[i.name.toLowerCase()] = i; });

        // Look up each ingredient in OFf sequentially
        for (let i = 0; i < uniqueIngNames.length; i++) {
          const ingName = uniqueIngNames[i];
          setImportMsg(`Looking up ingredients (${i+1}/${uniqueIngNames.length})…`);
          const key = ingName.toLowerCase();

          // Ensure ingredient registry entry
          if (!ingIdx[key]) {
            const newId = uid("ing");
            const newIng = { id:newId, name:ingName, defaultUnit:"g", category:"pantry" };
            newIngs.push(newIng);
            ingIdx[key] = newIng;
          }
          ingNameToId[ingName] = ingIdx[key].id;

          // Try to add food library entry (skip trivials)
          if (!foodIdx[key] && !SKIP_OFF.has(key)) {
            const off = await fetchOFFSingle(ingName);
            if (off && off.per100g.cal > 0) {
              const newFood = { id:uid("f"), name:ingName, brand:off.brand,
                per100g:off.per100g, useCount:0, source:"csv_import" };
              newFoods.push(newFood);
              foodIdx[key] = newFood;
            }
          }
        }

        // Build recipe entries (skip dupes by name)
        let newRecipes = [...(data.recipes || [])];
        const recipeIdx = {};
        newRecipes.forEach(r => { recipeIdx[r.name.toLowerCase()] = true; });
        let imported = 0;

        Object.values(recipeMap).forEach(rec => {
          if (recipeIdx[rec.name.toLowerCase()]) return; // skip dupe
          const recipeRows = rec.ingredients.map(ri => {
            const { qty, unit } = parseQuantityStr(ri.quantityStr);
            return { itemId: ingNameToId[ri.name] || null, quantity:qty, unit };
          }).filter(r => r.itemId);

          newRecipes.push({
            id: uid("rec"), name: rec.name,
            servings: rec.servings,
            servingNote: rec.servingNote || "",
            perServing: rec.perServing,
            ingredients: recipeRows,
            instructions: "",
            createdAt: new Date().toISOString(),
            source: "mfp_import",
          });
          imported++;
        });

        setData({ ...data, foods:newFoods, ingredients:newIngs, recipes:newRecipes });
        setImportMsg(`✓ Imported ${imported} recipe${imported!==1?"s":""} · ${uniqueIngNames.length} ingredients processed`);
        if (csvFileRef.current) csvFileRef.current.value = "";
      };

      const filtered = useMemo(() => {
        if (!search.trim()) return recipes;
        const q = search.toLowerCase();
        return recipes.filter(r => r.name.toLowerCase().includes(q));
      }, [recipes, search]);

      const saveRecipe = (recipe) => {
        let next;
        if (recipe.id) {
          next = recipes.map(r => r.id === recipe.id ? recipe : r);
        } else {
          next = [...recipes, { ...recipe, id: uid("rec"), createdAt: new Date().toISOString() }];
        }
        setData({ ...data, recipes: next });
        setEditRecipe(null);
      };

      const deleteRecipe = (id) => {
        if (!confirm("Delete this recipe?")) return;
        setData({ ...data, recipes: recipes.filter(r => r.id !== id) });
      };

      const parseRecipe = async () => {
        if (!parseText.trim()) return;
        if (!apiKey) { onMissingKey(); return; }
        setParsing(true);
        try {
          const ingList = ingredients.map(i => `${i.id}: ${i.name}`).join("\n");
          const prompt = `Parse this recipe and return ONLY a JSON object. Extract the name, number of servings (default 2), all ingredients with quantities/units, and any instructions.

Known ingredient registry (match by name when possible, use the itemId):
${ingList}

Return format:
{
  "name": "Recipe Name",
  "servings": 2,
  "ingredients": [
    {"itemId": "ing_xxx or null", "name": "ingredient name", "quantity": 100, "unit": "g"}
  ],
  "instructions": "brief steps if present"
}

Recipe text:
${parseText}`;
          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "x-api-key": apiKey, "anthropic-version": "2023-06-01", "content-type": "application/json" },
            body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 1024,
              messages: [{ role: "user", content: prompt }] }),
          });
          const result = await resp.json();
          const text = result.content?.[0]?.text || "";
          const match = text.match(/\{[\s\S]*\}/);
          if (!match) throw new Error("No JSON in response");
          const parsed = JSON.parse(match[0]);

          // Create registry entries for unknown ingredients
          const newIngs = [...ingredients];
          const recipeRows = (parsed.ingredients || []).map(ing => {
            let itemId = ing.itemId;
            if (!itemId || !ingredients.find(i => i.id === itemId)) {
              // Fuzzy match existing
              const nl = (ing.name || "").toLowerCase();
              const found = newIngs.find(i =>
                i.name.toLowerCase() === nl ||
                nl.includes(i.name.toLowerCase().split(" ")[0])
              );
              if (found) { itemId = found.id; }
              else {
                itemId = uid("ing");
                newIngs.push({ id: itemId, name: ing.name || "Unknown", defaultUnit: ing.unit || "g", category: "pantry" });
              }
            }
            return { itemId, quantity: ing.quantity || 0, unit: ing.unit || "g" };
          });

          // Persist new registry entries
          const updData = newIngs.length !== ingredients.length
            ? { ...data, ingredients: newIngs }
            : data;
          if (updData !== data) setData(updData);

          setEditRecipe({
            name: parsed.name || "Unnamed Recipe",
            servings: parsed.servings || 2,
            ingredients: recipeRows,
            instructions: parsed.instructions || "",
          });
          setParseText("");
        } catch (e) {
          alert("Parse failed: " + e.message);
        }
        setParsing(false);
      };

      const inputStyle = { background:S.panel, border:"1px solid "+S.border, borderRadius:10,
        padding:"10px 12px", color:S.text, fontSize:13, outline:"none" };

      return (
        <div style={{ padding:"14px 16px 24px" }}>

          {/* ── Search + New ── */}
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            <input placeholder="Search recipes…" value={search}
              onChange={e => setSearch(e.target.value)}
              style={{ ...inputStyle, flex:1 }} />
            <button onClick={() => setEditRecipe({})}
              style={{ background:S.accent, color:"#0a0c0f", border:"none", borderRadius:10,
                padding:"10px 16px", fontSize:12, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
              + NEW
            </button>
          </div>

          {/* ── MFP CSV Import ── */}
          <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
            <div style={{ fontSize:9, letterSpacing:2, color:S.dim, marginBottom:8 }}>IMPORT MFP RECIPE CSV</div>
            <div style={{ fontSize:12, color:S.dim, marginBottom:8, lineHeight:1.4 }}>
              Upload your MFP recipe export CSV. Macros are taken directly from MFP;
              ingredient library entries are fetched from Open Food Facts.
            </div>
            <input ref={csvFileRef} type="file" accept=".csv" style={{ display:"none" }}
              onChange={e => importCSV(e.target.files?.[0])} />
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <button onClick={() => csvFileRef.current?.click()}
                disabled={!!importMsg && !importMsg.startsWith("✓")}
                style={{ background: (importMsg && !importMsg.startsWith("✓")) ? S.border : S.accent,
                  color:"#0a0c0f", border:"none", borderRadius:8, padding:"10px 18px",
                  fontSize:12, fontWeight:700, letterSpacing:1,
                  cursor:(importMsg && !importMsg.startsWith("✓")) ? "default" : "pointer" }}>
                📥 CHOOSE CSV
              </button>
              {importMsg && (
                <span style={{ fontSize:12, color: importMsg.startsWith("✓") ? S.green : S.dim }}>
                  {importMsg}
                </span>
              )}
            </div>
          </div>

          {/* ── AI Parse ── */}
          <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, padding:"12px 14px", marginBottom:16 }}>
            <div style={{ fontSize:9, letterSpacing:2, color:S.dim, marginBottom:8 }}>AI RECIPE PARSER</div>
            <textarea placeholder="Paste recipe text here (ingredients, quantities, instructions)…"
              value={parseText} onChange={e => setParseText(e.target.value)} rows={4}
              style={{ width:"100%", background:S.bg, border:"1px solid "+S.border, borderRadius:8,
                padding:"10px", color:S.text, fontSize:13, outline:"none", resize:"vertical",
                fontFamily:"inherit", boxSizing:"border-box", marginBottom:8 }} />
            <button onClick={parseRecipe} disabled={parsing || !parseText.trim()}
              style={{ background: (parsing||!parseText.trim()) ? S.border : S.accent,
                color:"#0a0c0f", border:"none", borderRadius:8, padding:"10px 18px",
                fontSize:12, fontWeight:700, letterSpacing:1,
                cursor: (parsing||!parseText.trim()) ? "default" : "pointer" }}>
              {parsing ? "PARSING…" : "🤖 PARSE RECIPE"}
            </button>
          </div>

          {/* ── Recipe list ── */}
          {filtered.length === 0 && (
            <div style={{ padding:"40px 20px", textAlign:"center", color:S.dim, fontSize:13 }}>
              {search ? "No matches." : "No recipes yet. Add one above or paste recipe text to parse."}
            </div>
          )}

          {filtered.map(recipe => {
            const isExpanded = expandedId === recipe.id;
            return (
              <div key={recipe.id} style={{ background:S.panel, border:"1px solid "+S.border,
                borderRadius:12, marginBottom:10, overflow:"hidden" }}>

                {/* Header row */}
                <div onClick={() => setExpandedId(isExpanded ? null : recipe.id)}
                  style={{ display:"flex", alignItems:"center", padding:"12px 14px", cursor:"pointer" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:S.text }}>{recipe.name}</div>
                    <div style={{ fontSize:11, color:S.dim, marginTop:2 }}>
                      {recipe.servings} serving{recipe.servings !== 1 ? "s" : ""}
                      {recipe.servingNote ? <span style={{ color:S.dimmer }}> ({recipe.servingNote})</span> : ""}
                      {" · "}{recipe.ingredients.length} ingredient{recipe.ingredients.length !== 1 ? "s" : ""}
                    </div>
                    {recipe.perServing && (
                      <div style={{ fontSize:10, color:S.dimmer, marginTop:2 }}>
                        {recipe.perServing.cal} cal · {recipe.perServing.protein}g P · {recipe.perServing.carbs}g C · {recipe.perServing.fat}g F
                        {recipe.perServing.fibre > 0 ? ` · ${recipe.perServing.fibre}g fibre` : ""}
                        {" "}/ serving
                      </div>
                    )}
                  </div>
                  <span style={{ color:S.dim, fontSize:16 }}>{isExpanded ? "▲" : "▼"}</span>
                </div>

                {/* Expanded detail */}
                {isExpanded && (
                  <div style={{ padding:"0 14px 14px", borderTop:"1px solid "+S.border }}>
                    {recipe.ingredients.map((row, idx) => {
                      const ing = ingredients.find(i => i.id === row.itemId);
                      return (
                        <div key={idx} style={{ display:"flex", justifyContent:"space-between",
                          padding:"6px 0", borderBottom:"1px solid "+S.border, fontSize:13 }}>
                          <span style={{ color:S.text }}>{ing?.name || row.itemId}</span>
                          <span style={{ color:S.dim }}>{row.quantity} {row.unit}</span>
                        </div>
                      );
                    })}
                    {recipe.instructions && (
                      <div style={{ fontSize:12, color:S.dim, marginTop:10, lineHeight:1.5,
                        fontStyle:"italic" }}>{recipe.instructions}</div>
                    )}
                    <div style={{ display:"flex", gap:8, marginTop:12 }}>
                      <button onClick={() => setEditRecipe({ ...recipe })}
                        style={{ flex:1, background:"none", border:"1px solid "+S.dim, color:S.dim,
                          borderRadius:8, padding:"8px", fontSize:11, fontWeight:600,
                          letterSpacing:1, cursor:"pointer" }}>
                        EDIT
                      </button>
                      <button onClick={() => deleteRecipe(recipe.id)}
                        style={{ background:"none", border:"1px solid "+S.red, color:S.red,
                          borderRadius:8, padding:"8px 14px", fontSize:11, fontWeight:600,
                          letterSpacing:1, cursor:"pointer" }}>
                        DELETE
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {/* Recipe editor modal */}
          {editRecipe !== null && (
            <RecipeEditor
              recipe={editRecipe}
              ingredients={ingredients}
              onSave={saveRecipe}
              onCancel={() => setEditRecipe(null)}
            />
          )}
        </div>
      );
    }

    // ───────────────────── MEAL PLAN SECTION (M4) ─────────────────────
    function MealPlanSection({ data, setData }) {
      const [collapsed, setCollapsed]   = useState(false);
      const [pickDay, setPickDay]       = useState(null); // ISO date | null
      const [recipeSearch, setRecipeSearch] = useState("");

      const mealPlan  = data.mealPlan  || [];
      const recipes   = data.recipes   || [];
      const pantry    = data.pantry    || [];
      const ings      = data.ingredients || [];

      // Next 7 days (ISO dates)
      const days = useMemo(() => Array.from({ length: 7 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() + i);
        return d.toISOString().slice(0, 10);
      }), []);

      const getPlan = (date) => mealPlan.filter(p => p.date === date);

      const addMeal = (date, recipe) => {
        setData({ ...data, mealPlan: [...mealPlan, {
          id: uid("mp"), date, slot: "dinner",
          recipeId: recipe.id, servings: recipe.servings || 2,
        }]});
        setPickDay(null); setRecipeSearch("");
      };

      const removeMeal = (id) => setData({ ...data, mealPlan: mealPlan.filter(p => p.id !== id) });

      const updateServings = (id, val) => {
        const n = Math.max(1, Number(val) || 1);
        setData({ ...data, mealPlan: mealPlan.map(p => p.id === id ? { ...p, servings: n } : p) });
      };

      const recipeResults = useMemo(() => {
        const q = recipeSearch.toLowerCase().trim();
        return (q ? recipes.filter(r => r.name.toLowerCase().includes(q)) : recipes).slice(0, 5);
      }, [recipeSearch, recipes]);

      // Demand calculation: sum ingredient qty across plan, subtract pantry, add shortfalls as source:"plan"
      const buildShoppingList = () => {
        // 1. Sum demand per ingredient (in base units)
        const demand = {}; // itemId → { baseQty, unit, family }
        mealPlan.forEach(plan => {
          const recipe = recipes.find(r => r.id === plan.recipeId);
          if (!recipe) return;
          const scale = (plan.servings || 1) / (recipe.servings || 1);
          recipe.ingredients.forEach(ri => {
            if (!ri.itemId) return;
            const unit   = ri.unit || "g";
            const family = getUnitFamily(unit);
            const base   = toBaseUnit((ri.quantity || 0) * scale, unit);
            if (!demand[ri.itemId]) demand[ri.itemId] = { baseQty: 0, unit, family };
            // Only accumulate if same unit family
            if (demand[ri.itemId].family === family) demand[ri.itemId].baseQty += base;
          });
        });

        // 2. Subtract pantry stock
        pantry.forEach(p => {
          if (!demand[p.itemId]) return;
          if (p.trackingType === "state") {
            // State item: assume "have" = sufficient; "low"/"out" = don't reduce
            if (p.state === "have") delete demand[p.itemId];
            return;
          }
          const pantryBase = toBaseUnit(p.quantity || 0, p.unit || "g");
          const dem = demand[p.itemId];
          if (getUnitFamily(p.unit || "g") === dem.family) {
            dem.baseQty = Math.max(0, dem.baseQty - pantryBase);
          }
        });

        // 3. Build new plan-sourced grocery entries for remaining shortfalls
        const existing = (data.groceryList || []).filter(g => g.source !== "plan");
        const newEntries = Object.entries(demand)
          .filter(([, d]) => d.baseQty > 0)
          .map(([itemId, d]) => {
            const ing = ings.find(i => i.id === itemId);
            const qty = round(fromBaseUnit(d.baseQty, d.unit), 1);
            return { id: uid("g"), name: ing?.name || itemId, itemId,
              quantity: qty, unit: d.unit, source: "plan", done: false };
          });

        setData({ ...data, groceryList: [...existing, ...newEntries] });
        alert(`Shopping list updated — ${newEntries.length} plan item${newEntries.length!==1?"s":""} added.`);
      };

      const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const fmtDate = (iso) => {
        const d = new Date(iso + "T12:00:00");
        return DOW[d.getDay()] + " " + (d.getMonth()+1) + "/" + d.getDate();
      };

      const panelInput = { background:S.bg, border:"1px solid "+S.border, borderRadius:8,
        padding:"8px 10px", color:S.text, fontSize:13, outline:"none" };

      return (
        <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:12, marginBottom:16 }}>
          {/* Header toggle */}
          <div onClick={() => setCollapsed(!collapsed)}
            style={{ display:"flex", alignItems:"center", padding:"12px 14px", cursor:"pointer" }}>
            <div style={{ fontSize:9, letterSpacing:2, color:S.dim, flex:1 }}>
              MEAL PLAN · NEXT 7 DAYS {mealPlan.length > 0 ? "· "+mealPlan.length+" MEAL"+( mealPlan.length!==1?"S":"") : ""}
            </div>
            <span style={{ color:S.dim, fontSize:12 }}>{collapsed ? "▶" : "▼"}</span>
          </div>

          {!collapsed && (
            <div style={{ padding:"0 14px 14px" }}>
              {days.map(date => {
                const plans = getPlan(date);
                const isPicking = pickDay === date;
                return (
                  <div key={date} style={{ marginBottom:10 }}>
                    <div style={{ fontSize:11, color:S.dim, marginBottom:4, fontWeight:600 }}>
                      {fmtDate(date)}
                    </div>

                    {/* Planned meals for this day */}
                    {plans.map(p => {
                      const rec = recipes.find(r => r.id === p.recipeId);
                      return (
                        <div key={p.id} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4,
                          background:S.bg, border:"1px solid "+S.border, borderRadius:8, padding:"8px 10px" }}>
                          <span style={{ flex:1, fontSize:13, color:S.text }}>{rec?.name || "Unknown recipe"}</span>
                          <span style={{ fontSize:11, color:S.dimmer }}>srv</span>
                          <input type="number" min="1" value={p.servings}
                            onChange={e => updateServings(p.id, e.target.value)}
                            style={{ ...panelInput, width:44, textAlign:"center", padding:"4px 6px" }} />
                          <button onClick={() => removeMeal(p.id)}
                            style={{ background:"none", border:"none", color:S.dimmer,
                              fontSize:17, cursor:"pointer", padding:"0 2px" }}>×</button>
                        </div>
                      );
                    })}

                    {/* Recipe picker for this day */}
                    {isPicking ? (
                      <div style={{ background:S.bg, border:"1px solid "+S.border, borderRadius:8, padding:10 }}>
                        <input autoFocus placeholder="Search recipes…" value={recipeSearch}
                          onChange={e => setRecipeSearch(e.target.value)}
                          style={{ ...panelInput, width:"100%", marginBottom:6, boxSizing:"border-box" }} />
                        {recipes.length === 0 ? (
                          <div style={{ fontSize:12, color:S.dim, padding:"4px 0" }}>
                            No recipes yet — add some in the RECIPES tab.
                          </div>
                        ) : recipeResults.map(r => (
                          <button key={r.id} onClick={() => addMeal(date, r)}
                            style={{ width:"100%", textAlign:"left", background:S.panel,
                              border:"1px solid "+S.border, borderRadius:8, padding:"8px 10px",
                              color:S.text, fontSize:13, cursor:"pointer", marginBottom:3,
                              display:"block" }}>
                            {r.name}
                            <span style={{ fontSize:11, color:S.dim, marginLeft:6 }}>
                              {r.servings} srv · {r.ingredients.length} ing
                            </span>
                          </button>
                        ))}
                        <button onClick={() => { setPickDay(null); setRecipeSearch(""); }}
                          style={{ fontSize:11, color:S.dim, background:"none", border:"none",
                            cursor:"pointer", marginTop:4 }}>cancel</button>
                      </div>
                    ) : (
                      <button onClick={() => { setPickDay(date); setRecipeSearch(""); }}
                        style={{ fontSize:11, color:S.dimmer, background:"none", border:"none",
                          cursor:"pointer", padding:"2px 0" }}>
                        + add meal
                      </button>
                    )}
                  </div>
                );
              })}

              <button onClick={buildShoppingList} disabled={mealPlan.length === 0}
                style={{ width:"100%", marginTop:4,
                  background: mealPlan.length === 0 ? S.border : S.accent,
                  color: mealPlan.length === 0 ? S.dim : "#0a0c0f",
                  border:"none", borderRadius:10, padding:"12px",
                  fontSize:12, fontWeight:700, letterSpacing:1,
                  cursor: mealPlan.length === 0 ? "default" : "pointer" }}>
                📋 BUILD SHOPPING LIST
              </button>
            </div>
          )}
        </div>
      );
    }

    // ───────────────────── GROCERY TAB v7 M2 ─────────────────────
    function GroceryTab({ data, setData }) {
      const [newItem, setNewItem] = useState("");
      const [newQty, setNewQty]   = useState("");
      const [newUnit, setNewUnit] = useState("");

      const groceryList = data.groceryList || [];

      // Derived: pantry items that are low/out and not already in the shopping list
      const autoLow = useMemo(() => {
        const pantry    = data.pantry      || [];
        const ings      = data.ingredients || [];
        const inListIds = new Set(groceryList.filter(g => g.itemId).map(g => g.itemId));
        return pantry.filter(p => {
          if (p.neverFlag) return false;
          if (inListIds.has(p.itemId)) return false;
          if (p.trackingType === "state") return p.state === "out" || p.state === "low";
          const qty = p.quantity || 0;
          if (qty <= 0) return true;
          if (p.parLevel != null && p.parLevel > 0 && qty <= p.parLevel) return true;
          if (p.expiry && !p.expiryNA) {
            const days = (new Date(p.expiry + "T12:00:00") - new Date()) / 86400000;
            if (days < 0 || days <= SOON_DAYS) return true;
          }
          return false;
        }).map(p => {
          const ing = ings.find(i => i.id === p.itemId) || {};
          const isRed = p.trackingType === "state" ? p.state === "out" : (p.quantity || 0) <= 0;
          return { id: p.id, itemId: p.itemId, name: ing.name || "Unknown", isRed };
        });
      }, [data.pantry, data.ingredients, groceryList]);

      const toggle = (id) => {
        const next = groceryList.map(i => i.id === id ? { ...i, done: !i.done } : i);
        setData({ ...data, groceryList: next });
      };
      const remove = (id) => setData({ ...data, groceryList: groceryList.filter(i => i.id !== id) });

      const addItem = () => {
        if (!newItem.trim()) return;
        const item = {
          id: uid("g"),
          name: newItem.trim(),
          itemId: null,
          quantity: newQty ? parseFloat(newQty) : null,
          unit: newUnit.trim() || null,
          source: "manual",
          done: false,
        };
        setData({ ...data, groceryList: [...groceryList, item] });
        setNewItem(""); setNewQty(""); setNewUnit("");
      };

      const addLowToList = (lowItem) => {
        setData({ ...data, groceryList: [...groceryList, {
          id: uid("g"), name: lowItem.name, itemId: lowItem.itemId,
          quantity: null, unit: null, source: "low", done: false,
        }]});
      };

      const doneShopping = () => {
        if (!confirm("Clear all checked items?")) return;
        setData({ ...data, groceryList: groceryList.filter(i => !i.done) });
      };

      const SOURCE_LABEL = { low:"LOW", plan:"PLAN", coach:"COACH", manual:"" };
      const SOURCE_COLOR = { low:S.red, plan:S.accent, coach:"#9b8afb", manual:S.dimmer };

      const pending = groceryList.filter(i => !i.done);
      const done    = groceryList.filter(i =>  i.done);

      const inputStyle = { background:S.panel, border:"1px solid "+S.border, borderRadius:10, padding:"11px 12px", color:S.text, fontSize:14, outline:"none" };

      return (
        <div style={{ padding:"14px 16px 24px" }}>

          {/* ── Add item ── */}
          <div style={{ display:"flex", gap:6, marginBottom:14 }}>
            <input type="text" placeholder="Add item…" value={newItem}
              onChange={e => setNewItem(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addItem()}
              style={{ ...inputStyle, flex:1 }} />
            <input type="number" placeholder="qty" value={newQty}
              onChange={e => setNewQty(e.target.value)}
              style={{ ...inputStyle, width:52, padding:"11px 8px", fontSize:13 }} />
            <input type="text" placeholder="unit" value={newUnit}
              onChange={e => setNewUnit(e.target.value)}
              style={{ ...inputStyle, width:48, padding:"11px 8px", fontSize:13 }} />
            <button onClick={addItem}
              style={{ background:S.accent, color:"#0a0c0f", border:"none", borderRadius:10, padding:"11px 16px", fontSize:12, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
              ADD
            </button>
          </div>

          {/* ── Meal plan ── */}
          <MealPlanSection data={data} setData={setData} />

          {/* ── Needs restocking (auto-derived) ── */}
          {autoLow.length > 0 && (
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:S.dim, padding:"4px 4px 8px" }}>
                NEEDS RESTOCKING · {autoLow.length}
              </div>
              {autoLow.map(item => (
                <div key={item.id} style={{ display:"flex", alignItems:"center", background:S.panel,
                  border:`1px solid ${item.isRed ? S.red : S.accent}`, borderRadius:10, padding:"10px 12px", marginBottom:6 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%",
                    background: item.isRed ? S.red : S.accent, marginRight:10, flexShrink:0 }} />
                  <span style={{ flex:1, fontSize:13, color:S.text }}>{item.name}</span>
                  <span style={{ fontSize:9, fontWeight:700, letterSpacing:1,
                    color: item.isRed ? S.red : S.accent, marginRight:8 }}>
                    {item.isRed ? "OUT" : "LOW"}
                  </span>
                  <button onClick={() => addLowToList(item)}
                    style={{ background:"none", border:"1px solid "+S.dim, color:S.dim,
                      borderRadius:6, padding:"3px 8px", fontSize:10, cursor:"pointer", letterSpacing:0.5 }}>
                    + LIST
                  </button>
                </div>
              ))}
            </div>
          )}

          {/* ── Shopping list — pending ── */}
          {pending.length > 0 && (
            <div style={{ marginBottom:8 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:S.dim, padding:"4px 4px 8px" }}>
                SHOPPING LIST · {pending.length}
              </div>
              {pending.map(item => (
                <div key={item.id} style={{ display:"flex", alignItems:"center", background:S.panel,
                  border:"1px solid "+S.border, borderRadius:10, padding:"10px 12px", marginBottom:6 }}>
                  <button onClick={() => toggle(item.id)}
                    style={{ width:22, height:22, borderRadius:6, background:"transparent",
                      border:"2px solid "+S.dim, marginRight:12, color:"#0a0c0f", fontSize:12,
                      fontWeight:700, cursor:"pointer", padding:0, flexShrink:0 }} />
                  <span style={{ flex:1, fontSize:13, color:S.text }}>
                    {item.name}
                    {item.quantity != null &&
                      <span style={{ color:S.dim, marginLeft:5 }}>
                        {item.quantity}{item.unit ? " "+item.unit : ""}
                      </span>}
                  </span>
                  {item.source && item.source !== "manual" && (
                    <span style={{ fontSize:9, fontWeight:700, letterSpacing:1,
                      color: SOURCE_COLOR[item.source] || S.dim, marginRight:8 }}>
                      {SOURCE_LABEL[item.source] || item.source.toUpperCase()}
                    </span>
                  )}
                  <button onClick={() => remove(item.id)}
                    style={{ background:"none", border:"none", color:S.dimmer, fontSize:18, cursor:"pointer", padding:"0 4px" }}>×</button>
                </div>
              ))}
            </div>
          )}

          {/* ── Shopping list — done ── */}
          {done.length > 0 && (
            <div style={{ marginBottom:8 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:S.dimmer, padding:"4px 4px 8px" }}>
                DONE · {done.length}
              </div>
              {done.map(item => (
                <div key={item.id} style={{ display:"flex", alignItems:"center", background:S.panel,
                  border:"1px solid "+S.border, borderRadius:10, padding:"10px 12px", marginBottom:6, opacity:0.55 }}>
                  <button onClick={() => toggle(item.id)}
                    style={{ width:22, height:22, borderRadius:6, background:S.green,
                      border:"2px solid "+S.green, marginRight:12, color:"#0a0c0f", fontSize:12,
                      fontWeight:700, cursor:"pointer", padding:0, flexShrink:0 }}>✓</button>
                  <span style={{ flex:1, fontSize:13, color:S.dim, textDecoration:"line-through" }}>
                    {item.name}
                    {item.quantity != null &&
                      <span style={{ marginLeft:5 }}>{item.quantity}{item.unit ? " "+item.unit : ""}</span>}
                  </span>
                  <button onClick={() => remove(item.id)}
                    style={{ background:"none", border:"none", color:S.dimmer, fontSize:18, cursor:"pointer", padding:"0 4px" }}>×</button>
                </div>
              ))}
            </div>
          )}

          {autoLow.length === 0 && groceryList.length === 0 && (
            <div style={{ padding:"40px 20px", textAlign:"center", color:S.dim, fontSize:13 }}>
              All stocked up! Add items above.
            </div>
          )}

          {done.length > 0 && (
            <button onClick={doneShopping}
              style={{ width:"100%", background:S.panel, border:"1px solid "+S.border,
                color:S.dim, padding:"12px", borderRadius:10, fontSize:11,
                fontWeight:600, letterSpacing:1, cursor:"pointer", marginTop:6 }}>
              DONE SHOPPING · CLEAR {done.length} ITEM{done.length !== 1 ? "S" : ""}
            </button>
          )}
        </div>
      );
    }

    // ───────────────────── PANTRY TAB v7 ─────────────────────
    function PantryTab({ data, setData, apiKey, onMissingKey }) {
      const [scanMode, setScanMode]     = useState(null);
      const [showFlagged, setShowFlagged] = useState(false);
      const [expandedId, setExpandedId] = useState(null);
      const [editQtyId, setEditQtyId]   = useState(null);
      const [showAdd, setShowAdd]       = useState(false);
      const [addName, setAddName]       = useState("");
      const [addCat, setAddCat]         = useState("fridge");
      const [addTracking, setAddTracking] = useState("count");
      const [addQty, setAddQty]         = useState("");
      const [addUnit, setAddUnit]       = useState("portions");
      const [addPar, setAddPar]         = useState("");

      const [editItemId, setEditItemId] = useState(null);
      const [editName, setEditName]     = useState("");
      const [editCat, setEditCat]       = useState("fridge");
      const [editTracking, setEditTracking] = useState("count");
      const [editUnit, setEditUnit]     = useState("portions");
      const [editPar, setEditPar]       = useState("");

      const ingredients = data.ingredients || [];
      const pantry      = data.pantry      || [];
      const getIng = (itemId) => ingredients.find(i => i.id === itemId) || { name: itemId || "Unknown", category: "pantry" };

      const getStatus = (item) => {
        if (item.neverFlag) return "neutral";
        if (item.trackingType === "state") {
          if (item.state === "out") return "red";
          if (item.state === "low") return "yellow";
          if (item.expiryNA) return "neutral";
          return "green";
        }
        const qty = item.quantity || 0;
        if (qty <= 0) return "red";
        if (item.expiry && !item.expiryNA) {
          const days = (new Date(item.expiry + "T12:00:00") - new Date()) / 86400000;
          if (days < 0) return "red";
          if (days <= SOON_DAYS) return "yellow";
        }
        if (item.parLevel != null && item.parLevel > 0 && qty <= item.parLevel) return "yellow";
        if (item.expiryNA && !item.parLevel) return "neutral";
        return "green";
      };

      const STATUS_COLOR = { green:S.green, yellow:S.accent, red:S.red, neutral:S.dimmer };
      const getStep = (unit) => (unit==="g"||unit==="ml") ? 50 : (unit==="kg"||unit==="L") ? 0.5 : 1;

      const adjustQty = (id, delta) => {
        const updated = pantry.map(p => p.id!==id ? p : { ...p, quantity: Math.max(0, round((p.quantity||0)+delta,1)) });
        setData({ ...data, pantry: updated });
      };
      const setQtyDirect = (id, val) => {
        const n = parseFloat(val);
        if (isNaN(n)||n<0) return;
        const updated = pantry.map(p => p.id!==id ? p : { ...p, quantity: round(n,1) });
        setData({ ...data, pantry: updated });
      };
      const setStateVal = (id, state) => {
        const updated = pantry.map(p => p.id!==id ? p : { ...p, state });
        setData({ ...data, pantry: updated });
      };
      const setExpiryVal = (id, expiry, expiryNA) => {
        const updated = pantry.map(p => p.id!==id ? p : { ...p, expiry: expiryNA ? null : expiry, expiryNA });
        setData({ ...data, pantry: updated });
      };
      const removeItem = (id) => setData({ ...data, pantry: pantry.filter(p => p.id!==id) });
      const switchTracking = (id, toType) => {
        const updated = pantry.map(p => {
          if (p.id!==id) return p;
          if (toType==="count") return { ...p, trackingType:"count", quantity:0, state:null };
          return { ...p, trackingType:"state", state:"have", quantity:null };
        });
        setData({ ...data, pantry: updated });
      };

      const openEdit = (item) => {
        const ing = getIng(item.itemId);
        setEditName(ing.name || "");
        setEditCat(ing.category || "fridge");
        setEditUnit(item.unit || ing.defaultUnit || "portions");
        setEditPar(item.parLevel != null ? String(item.parLevel) : "");
        setEditTracking(item.trackingType || "count");
        setEditItemId(item.id);
      };

      const saveItemEdit = () => {
        const item = pantry.find(p => p.id === editItemId);
        if (!item) { setEditItemId(null); return; }
        const par = editPar !== "" ? parseFloat(editPar) : null;
        const toType = editTracking;
        const updatedPantry = pantry.map(p => {
          if (p.id !== editItemId) return p;
          const base = { ...p, unit: editUnit, parLevel: isNaN(par) ? null : par, trackingType: toType };
          if (toType === "count" && p.trackingType !== "count") return { ...base, quantity: 0, state: null };
          if (toType === "state" && p.trackingType !== "state") return { ...base, state: "have", quantity: null };
          return base;
        });
        const updatedIngs = ingredients.map(i => {
          if (i.id !== item.itemId) return i;
          return { ...i, name: editName.trim() || i.name, category: editCat, defaultUnit: editUnit };
        });
        setData({ ...data, ingredients: updatedIngs, pantry: updatedPantry });
        setEditItemId(null);
      };

      // Scan result → link to registry
      const handleScanResult = (rawItems) => {
        const newIngs = [...ingredients];
        const newPantry = [...pantry];
        rawItems.forEach(raw => {
          const nl = (raw.name||"").toLowerCase();
          let ing = newIngs.find(i => i.name.toLowerCase()===nl) ||
                    newIngs.find(i => nl.includes(i.name.toLowerCase()) || i.name.toLowerCase().includes(nl.split(" ")[0]));
          let itemId;
          if (!ing) {
            itemId = uid("ing");
            const cat = (raw.category||"PANTRY").toLowerCase();
            ing = { id:itemId, name:raw.name||"Unknown", defaultUnit:"portions", category:["freezer","fridge"].includes(cat)?cat:"pantry" };
            newIngs.push(ing);
          } else { itemId = ing.id; }
          const m = String(raw.quantity||"").match(/^(\d+\.?\d*)\s*([a-zA-Z]+)?/);
          const qty  = m ? parseFloat(m[1]) : null;
          const unit = (m&&m[2]) ? m[2] : ing.defaultUnit;
          const par  = qty ? Math.max(1, Math.round(qty*0.3)) : null;
          const existing = newPantry.find(p => p.itemId===itemId);
          if (existing) { if (existing.trackingType==="count"&&qty!=null) existing.quantity=qty; }
          else newPantry.push({ id:uid("pan"), itemId, trackingType:qty!=null?"count":"state",
            quantity:qty, unit, state:qty!=null?null:"have", parLevel:par, expiry:raw.expiry||null, expiryNA:!raw.expiry });
        });
        setData({ ...data, ingredients:newIngs, pantry:newPantry });
        setScanMode(null);
      };

      const handleManualAdd = () => {
        if (!addName.trim()) return;
        const ingId = uid("ing");
        const newIng = { id:ingId, name:addName.trim(), defaultUnit:addUnit, category:addCat };
        const qty = parseFloat(addQty);
        const par = parseFloat(addPar);
        const newItem = { id:uid("pan"), itemId:ingId, trackingType:addTracking,
          quantity: addTracking==="count"&&!isNaN(qty) ? qty : null,
          unit:addUnit, state:addTracking==="state"?"have":null,
          parLevel:!isNaN(par)?par:null, expiry:null,
          expiryNA:addCat==="freezer"||addCat==="pantry" };
        setData({ ...data, ingredients:[...ingredients,newIng], pantry:[...pantry,newItem] });
        setAddName(""); setAddQty(""); setAddPar(""); setAddUnit("portions"); setShowAdd(false);
      };

      const displayPantry = useMemo(() => {
        if (!showFlagged) return pantry;
        const ord = { red:0, yellow:1, green:2, neutral:3 };
        return [...pantry].sort((a,b) => (ord[getStatus(a)]||3)-(ord[getStatus(b)]||3));
      }, [pantry, showFlagged, ingredients]);

      const grouped = useMemo(() => {
        const g = { freezer:[], fridge:[], pantry:[] };
        displayPantry.forEach(p => { const c=(getIng(p.itemId).category||"pantry"); (g[c]||(g[c]=[])).push(p); });
        return g;
      }, [displayPantry, ingredients]);

      const CAT_LABEL = { freezer:"❄️ FREEZER", fridge:"🧊 FRIDGE", pantry:"🫙 PANTRY" };
      const abtn = (active, lbl, onClick) => (
        <button onClick={onClick} style={{ flex:1, padding:"8px 4px", borderRadius:7, border:`1px solid ${active?S.accent:S.border}`, background:active?`${S.accent}22`:S.panel2, color:active?S.accent:S.dim, fontSize:10, fontWeight:600, letterSpacing:0.5, cursor:"pointer" }}>{lbl}</button>
      );

      if (scanMode) return <PantryScan mode={scanMode} apiKey={apiKey} onClose={() => setScanMode(null)} onResult={handleScanResult} />;

      return (
        <div style={{ padding:"14px 16px 24px" }}>
          {/* Action buttons */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:8 }}>
            {[["📷","SCAN","single"],["📦","BULK","bulk"],["＋","ADD",null]].map(([icon,lbl,mode]) => (
              <button key={lbl} onClick={() => { if (mode) { if (!apiKey){onMissingKey();return;} setScanMode(mode); } else setShowAdd(v=>!v); }}
                style={{ background:`${S.accent}14`, border:`1px solid ${S.accent}44`, color:S.accent, padding:"11px 4px", borderRadius:10, fontSize:11, fontWeight:700, letterSpacing:1, cursor:"pointer" }}>
                {icon} {lbl}
              </button>
            ))}
          </div>
          <button onClick={() => setShowFlagged(v=>!v)} style={{ width:"100%", background:showFlagged?`${S.accent}18`:S.panel, border:`1px solid ${showFlagged?S.accent:S.border}`, color:showFlagged?S.accent:S.dim, padding:"7px", borderRadius:8, fontSize:9, fontWeight:600, letterSpacing:1.5, cursor:"pointer", marginBottom:12 }}>
            {showFlagged?"● FLAGGED FIRST":"○ FLAGGED FIRST"}
          </button>

          {/* Manual add form */}
          {showAdd && (
            <div style={{ background:S.panel, border:"1px solid "+S.border, borderRadius:10, padding:12, marginBottom:12 }}>
              <input type="text" placeholder="Item name *" value={addName} onChange={e=>setAddName(e.target.value)} autoFocus
                style={{ width:"100%", background:S.panel2, border:"1px solid "+S.border, borderRadius:8, padding:"10px 12px", color:S.text, fontSize:13, outline:"none", marginBottom:8 }} />
              <div style={{ display:"flex", gap:5, marginBottom:7 }}>
                {["freezer","fridge","pantry"].map(c => abtn(addCat===c, c.toUpperCase(), ()=>setAddCat(c)))}
              </div>
              <div style={{ display:"flex", gap:5, marginBottom:7 }}>
                {abtn(addTracking==="count","COUNT",()=>setAddTracking("count"))}
                {abtn(addTracking==="state","HAVE/LOW/OUT",()=>setAddTracking("state"))}
              </div>
              {addTracking==="count" && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:7 }}>
                  {[["Qty",addQty,setAddQty],["Unit",addUnit,setAddUnit],["Par",addPar,setAddPar]].map(([ph,v,sv])=>(
                    <input key={ph} type="text" inputMode={ph==="Unit"?"text":"decimal"} placeholder={ph} value={v} onChange={e=>sv(e.target.value)}
                      style={{ background:S.panel2, border:"1px solid "+S.border, borderRadius:8, padding:"8px 6px", color:S.text, fontSize:12, outline:"none", textAlign:"center" }} />
                  ))}
                </div>
              )}
              <button onClick={handleManualAdd} disabled={!addName.trim()} style={{ width:"100%", background:addName.trim()?S.accent:S.panel2, color:addName.trim()?"#0a0c0f":S.dim, border:"none", borderRadius:8, padding:"10px", fontSize:11, fontWeight:700, letterSpacing:1, cursor:addName.trim()?"pointer":"not-allowed" }}>
                ADD TO PANTRY
              </button>
            </div>
          )}

          {/* Divider below controls */}
          <div style={{ height:"2px", background:"rgba(255,255,255,0.35)", margin:"4px 0 16px" }} />

          {/* Item list */}
          {Object.entries(grouped)
            .filter(([, items]) => items.length > 0)
            .map(([cat, items], idx) => (
            <div key={cat} style={{ marginBottom:16, ...(idx > 0 ? { borderTop:"1px solid rgba(255,255,255,0.25)", paddingTop:14, marginTop:4 } : {}) }}>
              <div style={{ fontSize:9, letterSpacing:2, color:S.dim, padding:"4px 0 8px", fontWeight:700 }}>{CAT_LABEL[cat]||cat.toUpperCase()} · {items.length}</div>
              {items.map(item => {
                const ing    = getIng(item.itemId);
                const status = getStatus(item);
                const dot    = STATUS_COLOR[status];
                const step   = getStep(item.unit||"portions");
                const isExp  = expandedId===item.id;
                return (
                  <div key={item.id} style={{ background:S.panel, border:`1px solid ${status==="red"?"rgba(248,113,113,0.3)":status==="yellow"?"rgba(200,169,110,0.25)":S.border}`, borderRadius:10, padding:"10px 12px", marginBottom:6 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:dot, flexShrink:0 }} />
                      <button onClick={() => openEdit(item)} style={{ flex:1, fontSize:13, color:S.text, fontWeight:500, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", background:"none", border:"none", cursor:"pointer", textAlign:"left", padding:0 }}>{ing.name}</button>
                      {item.trackingType==="count" ? (
                        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                          <button onClick={()=>adjustQty(item.id,-step)} style={{ width:34,height:34,borderRadius:8,background:S.panel2,border:"1px solid "+S.border,color:S.text,fontSize:18,cursor:"pointer",lineHeight:1,flexShrink:0 }}>−</button>
                          {editQtyId===item.id ? (
                            <input type="text" inputMode="decimal" autoFocus defaultValue={item.quantity}
                              onBlur={e=>{setQtyDirect(item.id,e.target.value);setEditQtyId(null);}}
