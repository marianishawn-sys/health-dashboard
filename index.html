    // ───────────────────── PANTRY SCAN ─────────────────────
    function PantryScan({ mode, apiKey, onClose, onResult }) {
      const [phase, setPhase] = useState("capture");
      const [results, setResults] = useState([]);
      const [error, setError] = useState("");
      const fileRef = useRef(null);
      const cameraRef = useRef(null);

      const handleFile = (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => analyze(reader.result);
        reader.readAsDataURL(f);
      };

      const analyze = async (dataUrl) => {
        setPhase("analyzing");
        try {
          const base64 = dataUrl.split(",")[1];
          const mimeType = dataUrl.match(/data:(.*?);/)[1];
          const prompt = mode === "single"
            ? "Identify the single product in this image. Read the label/package. Return ONLY valid JSON: {\"items\":[{\"name\":\"specific name\",\"brand\":\"\",\"category\":\"FREEZER|FRIDGE|PANTRY\",\"quantity\":\"e.g. 500g or 1L\",\"expiry\":\"YYYY-MM-DD if visible else empty\",\"confidence\":\"HIGH|MEDIUM|LOW\"}]}"
            : "Identify EVERY visible food item in this photo of a freezer/fridge/pantry shelf. Be exhaustive. Return ONLY valid JSON: {\"items\":[{\"name\":\"specific name\",\"brand\":\"\",\"category\":\"FREEZER|FRIDGE|PANTRY\",\"quantity\":\"approximate\",\"expiry\":\"\",\"confidence\":\"HIGH|MEDIUM|LOW\"}]}";

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: CLAUDE_MODEL,
              max_tokens: 2000,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: mimeType, data: base64 } },
                  { type: "text", text: prompt },
                ],
              }],
            }),
          });
          if (!res.ok) throw new Error("API error " + res.status);
          const data = await res.json();
          const text = data.content[0].text;
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error("No JSON in response");
          const parsed = JSON.parse(jsonMatch[0]);
          const items = (parsed.items || []).map(it => ({
            ...it,
            id: uid("ps"),
            selected: true,
          }));
          setResults(items);
          setPhase("review");
        } catch (err) {
          setError(err.message || "Scan failed");
          setPhase("error");
        }
      };

      const confirm = () => {
        const selected = results.filter(r => r.selected).map(({ selected, id, confidence, ...rest }) => rest);
        onResult(selected);
      };

      if (phase === "capture") {
        return (
          <div style={{ padding:"14px 16px 24px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
              <button onClick={onClose} style={{ background:"none", border:"none", color:S.dim, fontSize:13, cursor:"pointer", letterSpacing:1 }}>← BACK</button>
              <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>{mode === "single" ? "ADD ITEM" : "BULK SCAN"}</div>
              <div style={{ width:50 }} />
            </div>
            <div style={{ padding:"40px 20px", textAlign:"center" }}>
              <div style={{ fontSize:52, marginBottom:14 }}>{mode === "single" ? "📷" : "📦"}</div>
              <div style={{ fontSize:14, color:S.text, marginBottom:8 }}>
                {mode === "single" ? "Point at a single product" : "Capture an open shelf"}
              </div>
              <div style={{ fontSize:11, color:S.dim, marginBottom:24, lineHeight:1.5 }}>
                {mode === "single" ? "AI reads the label and captures details" : "AI identifies every visible item"}
              </div>
              <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display:"none" }} />
              <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }} />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <button onClick={() => cameraRef.current && cameraRef.current.click()} style={{ background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"16px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                  📷 CAMERA
                </button>
                <button onClick={() => fileRef.current && fileRef.current.click()} style={{ background:S.panel, color:S.text, border:"1px solid "+S.border, borderRadius:12, padding:"16px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                  🖼️ UPLOAD
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (phase === "analyzing") {
        return (
          <div style={{ padding:"60px 20px", textAlign:"center" }}>
            <div className="spin" style={{ width:36, height:36, border:"3px solid "+S.dim, borderTopColor:S.accent, borderRadius:"50%", margin:"0 auto 14px" }} />
            <div style={{ fontSize:12, color:S.dim, letterSpacing:1 }}>ANALYZING</div>
          </div>
        );
      }

      if (phase === "error") {
        return (
          <div style={{ padding:"24px 16px" }}>
            <div style={{ fontSize:13, color:S.red, marginBottom:10 }}>Scan failed</div>
            <div style={{ fontSize:11, color:S.dim, marginBottom:20 }}>{error}</div>
            <button onClick={() => { setError(""); setPhase("capture"); }} style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, color:S.text, padding:"12px", borderRadius:10, fontSize:12, fontWeight:600, cursor:"pointer" }}>
              TRY AGAIN
            </button>
          </div>
        );
      }

      return (
        <div style={{ padding:"14px 16px 24px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <button onClick={() => setPhase("capture")} style={{ background:"none", border:"none", color:S.dim, fontSize:13, cursor:"pointer", letterSpacing:1 }}>← RETAKE</button>
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>RESULTS · {results.length}</div>
            <div style={{ width:60 }} />
          </div>
          {results.map(r => (
            <div key={r.id} style={{ background: r.selected ? S.panel : S.panel2, border:`1px solid ${r.selected ? S.borderHi : S.border}`, borderRadius:10, padding:10, marginBottom:6, opacity: r.selected ? 1 : 0.55 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <button onClick={() => setResults(results.map(x => x.id === r.id ? { ...x, selected: !x.selected } : x))}
                  style={{ width:22, height:22, borderRadius:6, background: r.selected ? S.accent : "transparent", border:`2px solid ${r.selected ? S.accent : S.dim}`, color:"#0a0c0f", fontSize:12, fontWeight:700, cursor:"pointer", padding:0, flexShrink:0 }}>
                  {r.selected ? "✓" : ""}
                </button>
                <div style={{ flex:1, minWidth:0 }}>
                  <input type="text" value={r.name} onChange={e => setResults(results.map(x => x.id === r.id ? { ...x, name: e.target.value } : x))}
                    style={{ width:"100%", background:"transparent", border:"none", color:S.text, fontSize:13, fontWeight:500, outline:"none", padding:0 }} />
                  <div style={{ fontSize:10, color:S.dim, marginTop:2 }}>{r.category} · {r.quantity || "—"} {r.expiry && "· exp "+r.expiry}</div>
                </div>
                <span style={{ fontSize:9, letterSpacing:1, color: r.confidence === "HIGH" ? S.green : r.confidence === "MEDIUM" ? S.accent : S.red, flexShrink:0 }}>{r.confidence}</span>
              </div>
            </div>
          ))}
          <button onClick={confirm} disabled={results.filter(r => r.selected).length === 0}
            style={{ width:"100%", background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"14px", fontSize:12, fontWeight:700, letterSpacing:1.5, cursor:"pointer", marginTop:12 }}>
            ADD {results.filter(r => r.selected).length} ITEMS
          </button>
        </div>
      );
    }

    // ───────────────────── MFP IMPORT ─────────────────────
    function MFPImport({ apiKey, data, setData, onClose }) {
      const [phase, setPhase] = useState("pick"); // pick | analyzing | review | done | error
      const [progress, setProgress] = useState("");
      const [results, setResults] = useState([]);
      const [error, setError] = useState("");
      const fileRef = useRef(null);

      const handleFile = (e) => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        if (!f.name.toLowerCase().endsWith(".pdf")) {
          setError("Please pick a PDF file (MFP exports as PDF).");
          setPhase("error");
          return;
        }
        const reader = new FileReader();
        reader.onload = () => analyze(reader.result, f.name);
        reader.readAsDataURL(f);
      };

      const analyze = async (dataUrl, filename) => {
        setPhase("analyzing");
        setProgress("Uploading PDF to Claude…");
        try {
          const base64 = dataUrl.split(",")[1];
          const prompt = "This is a MyFitnessPal food diary export. Extract every DISTINCT food item logged across the report. For each unique food, return: name, brand (if known), the most common portion (with grams if possible — if MFP shows '1 cup' or '1 serving', infer typical grams), and macros per 100g (back-calculate from the logged portion macros). Do not duplicate; if 'Chicken Breast' appears 20 times, return it ONCE with its typical portion. Include up to 200 distinct foods. Return ONLY valid JSON, no markdown, no commentary: {\"foods\":[{\"name\":\"string\",\"brand\":\"string or empty\",\"refGrams\":number,\"refLabel\":\"string e.g. '1 cup' or '150g'\",\"per100g\":{\"cal\":number,\"protein\":number,\"carbs\":number,\"fat\":number},\"category\":\"protein|grain|dairy|veg|fruit|fat|legume|beverage|supplement|meal|other\"}]}";

          setProgress("Claude is reading the PDF and extracting foods…");
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: CLAUDE_MODEL,
              max_tokens: 16000,
              messages: [{
                role: "user",
                content: [
                  { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
                  { type: "text", text: prompt },
                ],
              }],
            }),
          });
          if (!res.ok) {
            const errText = await res.text();
            throw new Error("API error " + res.status + ": " + errText.slice(0,300));
          }
          const respData = await res.json();
          const text = respData.content[0].text;
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error("No JSON found in response");
          const parsed = JSON.parse(jsonMatch[0]);
          const foods = (parsed.foods || []).map((f, i) => ({
            id: "f_mfp_" + Date.now().toString(36) + "_" + i.toString(36),
            name: f.name,
            brand: f.brand || "",
            refPortion: { grams: f.refGrams || 100, label: f.refLabel || (f.refGrams ? f.refGrams + "g" : "100g") },
            per100g: f.per100g,
            category: f.category || "other",
            tags: [],
            source: "mfp_import",
            lastUsed: null,
            useCount: 0,
            selected: true,
          }));
          setResults(foods);
          setPhase("review");
        } catch (err) {
          console.error("MFP import failed", err);
          setError(err.message || "Import failed");
          setPhase("error");
        }
      };

      const importSelected = () => {
        const selected = results.filter(r => r.selected);
        // Dedupe against existing library by name (case-insensitive)
        const existingNames = new Set((data.foods || []).map(f => f.name.toLowerCase().trim()));
        const fresh = selected.filter(f => !existingNames.has(f.name.toLowerCase().trim()))
          .map(({ selected, ...rest }) => rest);
        const merged = [...(data.foods || []), ...fresh];
        setData({ ...data, foods: merged });
        setPhase("done");
        setProgress(fresh.length + " foods imported (" + (selected.length - fresh.length) + " duplicates skipped)");
      };

      return (
        <div style={{ position:"fixed", inset:0, background:S.bg, zIndex:250, padding:"16px 16px 24px", overflowY:"auto", paddingTop:"calc(env(safe-area-inset-top) + 16px)" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <button onClick={onClose} style={{ background:"none", border:"none", color:S.dim, fontSize:13, cursor:"pointer", letterSpacing:1 }}>← BACK</button>
            <div style={{ fontSize:10, letterSpacing:2, color:S.dim }}>MFP IMPORT</div>
            <div style={{ width:50 }} />
          </div>

          {phase === "pick" && (
            <div style={{ padding:"30px 0", textAlign:"center" }}>
              <div style={{ fontSize:48, marginBottom:14 }}>📥</div>
              <div style={{ fontSize:15, color:S.text, marginBottom:10 }}>Import MyFitnessPal History</div>
              <div style={{ fontSize:12, color:S.dim, marginBottom:24, lineHeight:1.6 }}>
                Pick the PDF you downloaded from MyFitnessPal.<br/>
                Claude will read every entry, dedupe, and seed your food library.<br/>
                <span style={{ color:S.accentDim }}>~5–15 cents per import, depending on PDF length.</span>
              </div>
              <input ref={fileRef} type="file" accept="application/pdf,.pdf" onChange={handleFile} style={{ display:"none" }} />
              <button onClick={() => fileRef.current && fileRef.current.click()}
                style={{ width:"100%", background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"16px", fontSize:13, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                📄 PICK PDF
              </button>
            </div>
          )}

          {phase === "analyzing" && (
            <div style={{ padding:"60px 20px", textAlign:"center" }}>
              <div className="spin" style={{ width:40, height:40, border:"3px solid "+S.dim, borderTopColor:S.accent, borderRadius:"50%", margin:"0 auto 16px" }} />
              <div style={{ fontSize:13, color:S.text, letterSpacing:1, marginBottom:6 }}>WORKING</div>
              <div style={{ fontSize:11, color:S.dim }}>{progress}</div>
              <div style={{ fontSize:10, color:S.dimmer, marginTop:14 }}>This can take 30–90 seconds for a 3-month export.</div>
            </div>
          )}

          {phase === "error" && (
            <div style={{ padding:"24px 0" }}>
              <div style={{ fontSize:13, color:S.red, marginBottom:10 }}>Import failed</div>
              <div style={{ fontSize:11, color:S.dim, marginBottom:20, wordBreak:"break-word" }}>{error}</div>
              <button onClick={() => { setError(""); setPhase("pick"); }} style={{ width:"100%", background:S.panel, border:"1px solid "+S.border, color:S.text, padding:"12px", borderRadius:10, fontSize:12, fontWeight:600, cursor:"pointer" }}>
                TRY AGAIN
              </button>
            </div>
          )}

          {phase === "review" && (
            <>
              <div style={{ fontSize:11, color:S.dim, marginBottom:10, letterSpacing:1 }}>
                FOUND {results.length} FOODS · DESELECT ANYTHING YOU DON'T WANT
              </div>
              <div style={{ display:"flex", gap:6, marginBottom:10 }}>
                <button onClick={() => setResults(results.map(r => ({ ...r, selected: true })))} style={{ flex:1, background:S.panel, border:"1px solid "+S.border, color:S.text, padding:"8px", borderRadius:8, fontSize:10, fontWeight:600, letterSpacing:1, cursor:"pointer" }}>
                  ✓ ALL
                </button>
                <button onClick={() => setResults(results.map(r => ({ ...r, selected: false })))} style={{ flex:1, background:S.panel, border:"1px solid "+S.border, color:S.text, padding:"8px", borderRadius:8, fontSize:10, fontWeight:600, letterSpacing:1, cursor:"pointer" }}>
                  ✗ NONE
                </button>
              </div>
              <div style={{ maxHeight:"calc(100vh - 280px)", overflowY:"auto", marginBottom:14 }}>
                {results.map(r => (
                  <div key={r.id} style={{ background: r.selected ? S.panel : S.panel2, border:`1px solid ${r.selected ? S.borderHi : S.border}`, borderRadius:8, padding:"8px 10px", marginBottom:4, opacity: r.selected ? 1 : 0.5, display:"flex", alignItems:"center", gap:8 }}
                    onClick={() => setResults(results.map(x => x.id === r.id ? { ...x, selected: !x.selected } : x))}>
                    <div style={{ width:18, height:18, borderRadius:5, background: r.selected ? S.accent : "transparent", border:`2px solid ${r.selected ? S.accent : S.dim}`, flexShrink:0, color:"#0a0c0f", fontSize:11, fontWeight:700, textAlign:"center", lineHeight:"14px" }}>
                      {r.selected ? "✓" : ""}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, color:S.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {r.name}{r.brand && <span style={{ color:S.dim }}> · {r.brand}</span>}
                      </div>
                      <div style={{ fontSize:9, color:S.dim, fontFamily:"'DM Mono',monospace", marginTop:1 }}>
                        {r.refPortion.label} · {round(r.per100g.cal)}/{round(r.per100g.protein,1)}P/{round(r.per100g.carbs,1)}C/{round(r.per100g.fat,1)}F per 100g
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={importSelected} disabled={results.filter(r => r.selected).length === 0}
                style={{ width:"100%", background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"14px", fontSize:12, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                IMPORT {results.filter(r => r.selected).length} FOODS
              </button>
            </>
          )}

          {phase === "done" && (
            <div style={{ padding:"60px 20px", textAlign:"center" }}>
              <div style={{ fontSize:48, marginBottom:14, color:S.green }}>✓</div>
              <div style={{ fontSize:15, color:S.text, marginBottom:10 }}>Import Complete</div>
              <div style={{ fontSize:12, color:S.dim, marginBottom:24 }}>{progress}</div>
              <button onClick={onClose} style={{ width:"100%", background:S.accent, color:"#0a0c0f", border:"none", borderRadius:12, padding:"14px", fontSize:12, fontWeight:700, letterSpacing:1.5, cursor:"pointer" }}>
                DONE
              </button>
            </div>
          )}
        </div>
      );
    }

    // ───────────────────── RENDER ─────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
